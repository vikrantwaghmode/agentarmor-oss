<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AgentArmor</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070e;--surface:#0d0d1a;--surface2:#131320;--border:#1e1e30;--border2:#2a2a42;
  --text:#e2e2f0;--dim:#6060a0;--muted:#3a3a58;
  --purple:#a78bfa;--purple-soft:rgba(167,139,250,.12);
  --green:#4ade80;--red:#f87171;--yellow:#fbbf24;--blue:#60a5fa;
  --font:'JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;--r:4px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.5}
button{cursor:pointer;font-family:inherit;font-size:inherit;border:none;background:none;color:inherit}
input{font-family:inherit;font-size:inherit;color:inherit}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.app{display:grid;grid-template-rows:auto auto auto 1fr;height:100vh;overflow:hidden}
.hdr{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:12px;padding:0 16px;height:44px;border-bottom:1px solid var(--border);background:var(--surface)}
.hdr-left{display:flex;align-items:center;gap:10px}
.brand{display:flex;align-items:center;gap:8px}
.brand-mark{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border:1px solid var(--purple);color:var(--purple);font-size:10px;font-weight:700;border-radius:var(--r)}
.brand-name{font-weight:700;font-size:14px;letter-spacing:-.3px}
.brand-name em{color:var(--purple);font-style:normal}
.brand-env{font-size:10px;color:var(--dim);border:1px solid var(--border2);padding:1px 6px;border-radius:10px}
.hdr-mid{display:flex;justify-content:center}
.kbd-hint{display:flex;align-items:center;gap:8px;padding:5px 12px;border:1px solid var(--border2);border-radius:var(--r);color:var(--dim);font-size:12px;background:var(--bg);transition:border-color .15s}
.kbd-hint:hover{border-color:var(--purple);color:var(--text)}
.kbd-hint kbd{padding:1px 5px;border:1px solid var(--border2);border-radius:3px;font-family:inherit;font-size:11px;background:var(--surface2)}
.hdr-right{display:flex;align-items:center;gap:12px}
.status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--dim)}
.led{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 3s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.sep{color:var(--muted)}
.role-badge{font-size:11px;color:var(--muted);background:var(--surface2);padding:2px 8px;border-radius:10px}
.logout-btn{padding:3px 10px;border:1px solid var(--border2);border-radius:var(--r);font-size:11px;color:var(--dim);transition:all .15s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}
.user{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--dim)}
.user-avatar{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:var(--purple-soft);border:1px solid var(--purple);border-radius:50%;font-size:9px;font-weight:700;color:var(--purple)}
.ticker{display:flex;align-items:center;height:26px;border-bottom:1px solid var(--border);background:var(--bg);overflow:hidden}
.ticker-label{flex-shrink:0;padding:0 10px;font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--green);border-right:1px solid var(--border)}
.ticker-wrap{flex:1;overflow:hidden}
.ticker-track{display:flex;white-space:nowrap;animation:scroll-ticker 50s linear infinite}
.ticker-track:hover{animation-play-state:paused}
.tick{padding:0 18px;font-size:11px;color:var(--dim);border-right:1px solid var(--border);flex-shrink:0}
.tick-blocked{color:var(--red)}.tick-redacted{color:var(--yellow)}
@keyframes scroll-ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 16px}
.tab{display:flex;align-items:center;gap:6px;padding:8px 14px;font-size:12px;color:var(--dim);border-bottom:2px solid transparent;transition:all .15s;position:relative;top:1px}
.tab:hover{color:var(--text)}.tab.on{color:var(--purple);border-bottom-color:var(--purple)}
.tab-num{font-size:10px;color:var(--muted);font-weight:700}.tab.on .tab-num{color:rgba(167,139,250,.5)}
.tab-badge{min-width:16px;height:16px;padding:0 4px;border-radius:10px;background:var(--border2);color:var(--dim);font-size:10px;display:inline-flex;align-items:center;justify-content:center}
.tab.on .tab-badge{background:var(--purple-soft);color:var(--purple)}
.main{overflow-y:auto;padding:20px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:20px}
.card{border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;background:var(--surface)}
.card-label{font-size:10px;color:var(--dim);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.card-val{font-size:26px;font-weight:700;letter-spacing:-1px}
.card-val.red{color:var(--red)}.card-val.yellow{color:var(--yellow)}.card-val.green{color:var(--green)}.card-val.purple{color:var(--purple)}
.card-sub{font-size:10px;color:var(--dim);margin-top:4px}
.rule-counts{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:8px;margin-bottom:20px}
.rc-item{border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;background:var(--surface)}
.rc-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.rc-val{font-size:18px;font-weight:700;color:var(--purple)}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.section-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--dim)}
.section-count{font-size:11px;color:var(--muted)}
.tbl-wrap{border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:var(--surface2)}
th{padding:7px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);border-bottom:1px solid var(--border)}
td{padding:8px 12px;font-size:12px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--surface2)}
.trunc{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;letter-spacing:.04em}
.badge-blocked{background:rgba(248,113,113,.15);color:var(--red)}
.badge-redacted{background:rgba(251,191,36,.15);color:var(--yellow)}
.badge-allowed{background:rgba(74,222,128,.1);color:var(--green)}
.badge-req{background:rgba(96,165,250,.1);color:var(--blue)}
.rule-group{border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.rule-group-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface2);cursor:pointer;user-select:none}
.rule-group-hdr:hover{background:var(--surface)}
.rule-group-name{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.rule-group-meta{font-size:10px;color:var(--dim)}
.rule-row{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-top:1px solid var(--border)}
.rule-text{font-size:11px;color:var(--dim);flex:1;margin-right:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.toggle{position:relative;width:28px;height:15px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--border2);border-radius:8px;transition:.2s;cursor:pointer}
.toggle input:checked+.toggle-track{background:var(--purple)}
.toggle-track::after{content:'';position:absolute;top:2px;left:2px;width:11px;height:11px;border-radius:50%;background:#fff;transition:.2s}
.toggle input:checked+.toggle-track::after{left:15px}
.save-bar{position:sticky;bottom:0;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--surface);border-top:1px solid var(--purple);margin:20px -20px -20px}
.save-note{font-size:11px;color:var(--purple)}
.btn-save{padding:5px 16px;background:var(--purple);color:#fff;border-radius:var(--r);font-size:12px;font-weight:600;transition:opacity .15s}
.btn-save:hover{opacity:.85}.btn-save:disabled{opacity:.4;cursor:default}
.fw-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border)}
.fw-row:last-child{border-bottom:none}
.fw-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.skill-card{border:1px solid var(--border);border-radius:var(--r);padding:14px;background:var(--surface);transition:border-color .15s}
.skill-card:hover{border-color:var(--purple)}
.skill-name{font-size:13px;font-weight:700;margin-bottom:4px}
.skill-desc{font-size:11px;color:var(--dim);margin-bottom:8px;line-height:1.5}
.skill-meta{font-size:10px;color:var(--muted)}
.skill-id{display:inline-block;padding:1px 7px;border:1px solid var(--border2);border-radius:10px;font-size:10px;color:var(--dim);margin-top:6px}
.search-bar{display:flex;gap:8px;margin-bottom:14px}
.search-input{flex:1;padding:6px 10px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--purple)}.search-input::placeholder{color:var(--muted)}
.filter-btn{padding:5px 10px;border:1px solid var(--border2);border-radius:var(--r);font-size:11px;color:var(--dim);transition:all .15s}
.filter-btn:hover,.filter-btn.on{border-color:var(--purple);color:var(--purple);background:var(--purple-soft)}
.interval-select{padding:5px 8px;border:1px solid var(--border2);border-radius:var(--r);font-size:11px;color:var(--dim);background:var(--bg);cursor:pointer;outline:none;font-family:var(--font);transition:border-color .15s}
.interval-select:hover,.interval-select:focus{border-color:var(--purple);color:var(--text)}
.interval-select option{background:var(--surface2);color:var(--text)}
.auto-indicator{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--green);animation:pulse 1.5s ease-in-out infinite}
.auto-indicator::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);display:inline-block}
.cmdk-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding-top:12vh}
.cmdk-box{width:540px;max-width:90vw;border:1px solid var(--border2);border-radius:8px;background:var(--surface);overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.7)}
.cmdk-iw{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border)}
.cmdk-icon{color:var(--purple);font-size:16px}
.cmdk-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:14px;font-family:var(--font)}
.cmdk-input::placeholder{color:var(--muted)}
.cmdk-list{max-height:340px;overflow-y:auto}
.cmdk-gl{padding:8px 14px 4px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.cmdk-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;transition:background .1s}
.cmdk-item:hover{background:var(--purple-soft)}
.cmdk-ii{width:18px;text-align:center;color:var(--dim)}.cmdk-il{font-size:12px}.cmdk-is{font-size:11px;color:var(--dim);margin-left:auto}
.cmdk-footer{display:flex;gap:16px;padding:8px 14px;border-top:1px solid var(--border);font-size:10px;color:var(--muted)}
.cmdk-footer kbd{padding:1px 5px;border:1px solid var(--border2);border-radius:3px;font-family:inherit}
.auth-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:2000}
.auth-box{width:380px;border:1px solid var(--border2);border-radius:8px;padding:32px;background:var(--surface);display:flex;flex-direction:column;gap:16px}
.auth-title{font-size:12px;color:var(--dim)}
.auth-input{padding:8px 12px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);outline:none;font-size:13px;font-family:var(--font);transition:border-color .15s}
.auth-input:focus{border-color:var(--purple)}
.auth-btn{padding:9px;background:var(--purple);color:#fff;border-radius:var(--r);font-size:13px;font-weight:600;transition:opacity .15s}
.auth-btn:hover{opacity:.85}
.auth-err{font-size:12px;color:var(--red)}
.empty{padding:40px;text-align:center;color:var(--muted);font-size:12px}
.loading{animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
code{background:var(--surface2);padding:1px 5px;border-radius:3px;font-family:var(--font);font-size:11px;color:var(--dim)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;
let _tok = '';
const apiFetch = (path, opts={}) => fetch('/armor/api/'+path, {...opts, headers:{Authorization:'Bearer '+_tok,'Content-Type':'application/json',...(opts.headers||{})}});
const fmt = n => n==null ? '—' : Number(n).toLocaleString();
const parseUptimeSec = s => { if(!s) return 1; const m=s.match(/(\d+)h(\d+)m(\d+)s/); return m?+m[1]*3600+ +m[2]*60+ +m[3]:1; };

function Auth({onAuth}) {
  const [val,setVal]=useState(''); const [err,setErr]=useState('');
  const submit = async () => {
    const t=val.trim(); if(!t) return;
    const r=await fetch('/armor/api/auth/role',{headers:{Authorization:'Bearer '+t}});
    const j=await r.json();
    if(j.role==='none'){setErr('Invalid token.');return;}
    _tok=t; onAuth(j.role);
  };
  return (
    <div className="auth-overlay">
      <div className="auth-box">
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
          <span className="brand-mark">AA</span>
          <span className="brand-name">Agent<em>Armor</em></span>
        </div>
        <p className="auth-title">Enter your access token to continue.</p>
        <input className="auth-input" type="password" placeholder="Bearer token…" value={val}
          onChange={e=>{setVal(e.target.value);setErr('');}} onKeyDown={e=>e.key==='Enter'&&submit()} autoFocus />
        {err&&<p className="auth-err">{err}</p>}
        <button className="auth-btn" onClick={submit}>Authenticate →</button>
      </div>
    </div>
  );
}

function Ticker({events}) {
  const items=events.filter(e=>e.action!=='ALLOWED').slice(0,20);
  if(!items.length) return <div className="ticker"><span className="ticker-label">LIVE</span><span style={{padding:'0 16px',fontSize:11,color:'var(--muted)'}}>No blocks yet — send a request to see activity</span></div>;
  const doubled=[...items,...items];
  return (
    <div className="ticker">
      <span className="ticker-label">LIVE</span>
      <div className="ticker-wrap">
        <div className="ticker-track">
          {doubled.map((e,i)=><span key={i} className={`tick tick-${(e.action||'').toLowerCase()}`}>[{e.action}]&nbsp;{e.rule_matched}&nbsp;&mdash;&nbsp;{e.direction}</span>)}
        </div>
      </div>
    </div>
  );
}

function Health({stats,audit}) {
  const recent=useMemo(()=>(audit||[]).filter(e=>e.action!=='ALLOWED').slice(0,12),[audit]);
  const rc=stats?.rule_counts||{};
  const rps=stats?.total>0?(stats.total/Math.max(1,parseUptimeSec(stats.uptime))).toFixed(2):'—';
  return (
    <div>
      <div className="cards">
        {[{label:'Blocked',val:stats?.blocked,cls:'red',sub:'Requests blocked'},{label:'Redacted',val:stats?.redacted,cls:'yellow',sub:'Secrets scrubbed'},{label:'Allowed',val:stats?.allowed,cls:'green',sub:'Passed all scanners'},{label:'Total',val:stats?.total,cls:'purple',sub:rps+'/s avg'},{label:'Uptime',val:stats?.uptime,cls:'',sub:'Since restart',sm:true}].map(c=>(
          <div key={c.label} className="card">
            <div className="card-label">{c.label}</div>
            <div className={`card-val ${c.cls}`} style={c.sm?{fontSize:18}:{}}>{c.val??'—'}</div>
            <div className="card-sub">{c.sub}</div>
          </div>
        ))}
      </div>
      <div className="section-hdr"><span className="section-title">Rule Counts</span></div>
      <div className="rule-counts">
        {[['Prompt Injection',rc.prompt_injection],['Secrets',rc.secrets],['PII',rc.pii],['Malicious',rc.malicious_content],['Internal IPs',rc.internal_ips],['Canary Tokens',rc.canary_tokens],['FW Domains',rc.firewall_domains],['Rate Limit RPM',rc.rate_limit_rpm]].map(([l,v])=>(
          <div key={l} className="rc-item"><div className="rc-label">{l}</div><div className="rc-val">{v??'—'}</div></div>
        ))}
      </div>
      <div className="section-hdr"><span className="section-title">Recent Blocks</span><span className="section-count">{recent.length} events</span></div>
      {!recent.length?<div className="empty">No blocks recorded yet.</div>:(
        <div className="tbl-wrap"><table>
          <thead><tr><th>Time</th><th>Direction</th><th>Action</th><th>Rule Matched</th></tr></thead>
          <tbody>{recent.map(e=>(
            <tr key={e.id}>
              <td style={{color:'var(--dim)',whiteSpace:'nowrap',fontSize:11}}>{(e.timestamp||'').slice(11,19)}</td>
              <td><span className="badge badge-req">{e.direction}</span></td>
              <td><span className={`badge badge-${(e.action||'').toLowerCase()}`}>{e.action}</span></td>
              <td className="trunc" style={{fontSize:11,color:'var(--dim)'}}>{e.rule_matched}</td>
            </tr>
          ))}</tbody>
        </table></div>
      )}
    </div>
  );
}

function Policy({role}) {
  const [pol,setPol]=useState(null); const [dirty,setDirty]=useState(false); const [saving,setSaving]=useState(false); const [open,setOpen]=useState({});
  const isAdmin = role === 'admin';
  useEffect(()=>{apiFetch('policy').then(r=>r.json()).then(d=>{setPol(d);setDirty(false);});},[]);
  const toggleScanner=key=>{if(!isAdmin)return;setPol(p=>{const n=JSON.parse(JSON.stringify(p));n.scanners[key].enabled=!n.scanners[key].enabled;return n;});setDirty(true);};
  const toggleRule=(key,lk,idx)=>{if(!isAdmin)return;setPol(p=>{const n=JSON.parse(JSON.stringify(p));n.scanners[key][lk][idx].enabled=!n.scanners[key][lk][idx].enabled;return n;});setDirty(true);};
  const save=async()=>{setSaving(true);await apiFetch('policy',{method:'POST',body:JSON.stringify(pol)});setSaving(false);setDirty(false);};

  /* Read-only dot shown to non-admin users instead of a toggle */
  const StatusDot=({on})=>(
    <span style={{width:8,height:8,borderRadius:'50%',background:on?'var(--green)':'var(--muted)',display:'inline-block',flexShrink:0}} title={on?'Enabled':'Disabled'} />
  );

  if(!pol) return <div className="empty loading">Loading policy…</div>;

  if(!isAdmin) return (
    <div>
      <p style={{fontSize:11,color:'var(--dim)',marginBottom:14,padding:'6px 10px',border:'1px solid var(--border2)',borderRadius:'var(--r)',display:'inline-block'}}>
        Read-only view — admin token required to edit rules.
      </p>
      {[{key:'prompt_injection',label:'Prompt Injection',lk:'blocked_phrases'},{key:'secrets',label:'Secret Redaction',lk:'redact_patterns'},{key:'pii',label:'PII / DLP',lk:'block_patterns'},{key:'malicious_content',label:'Malicious Content',lk:'block_patterns'},{key:'internal_ip_protection',label:'Internal IP / SSRF',lk:'block_patterns'},{key:'canary_tokens',label:'Canary Tokens',lk:'tokens'}].map(g=>{
        const scanner=pol.scanners[g.key]; if(!scanner) return null;
        const rules=scanner[g.lk]||[]; const isOpen=open[g.key]!==false; const en=rules.filter(r=>r.enabled).length;
        return (
          <div key={g.key} className="rule-group">
            <div className="rule-group-hdr" onClick={()=>setOpen(o=>({...o,[g.key]:!isOpen}))}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <StatusDot on={!!scanner.enabled} />
                <span className="rule-group-name" style={{color:scanner.enabled?'var(--text)':'var(--muted)'}}>{g.label}</span>
              </div>
              <span className="rule-group-meta">{en}/{rules.length} active &nbsp;{isOpen?'▲':'▼'}</span>
            </div>
            {isOpen&&rules.map((rule,i)=>(
              <div key={i} className="rule-row">
                <span className="rule-text" style={{color:rule.enabled?'var(--dim)':'var(--muted)'}}>{rule.rule}</span>
                <StatusDot on={!!rule.enabled} />
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );

  const groups=[{key:'prompt_injection',label:'Prompt Injection',lk:'blocked_phrases'},{key:'secrets',label:'Secret Redaction',lk:'redact_patterns'},{key:'pii',label:'PII / DLP',lk:'block_patterns'},{key:'malicious_content',label:'Malicious Content',lk:'block_patterns'},{key:'internal_ip_protection',label:'Internal IP / SSRF',lk:'block_patterns'},{key:'canary_tokens',label:'Canary Tokens',lk:'tokens'}];
  return (
    <div>
      {groups.map(g=>{
        const scanner=pol.scanners[g.key]; if(!scanner) return null;
        const rules=scanner[g.lk]||[]; const isOpen=open[g.key]!==false; const en=rules.filter(r=>r.enabled).length;
        return (
          <div key={g.key} className="rule-group">
            <div className="rule-group-hdr" onClick={()=>setOpen(o=>({...o,[g.key]:!isOpen}))}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <label className="toggle" onClick={e=>e.stopPropagation()}>
                  <input type="checkbox" checked={!!scanner.enabled} onChange={()=>toggleScanner(g.key)} />
                  <span className="toggle-track"></span>
                </label>
                <span className="rule-group-name">{g.label}</span>
              </div>
              <span className="rule-group-meta">{en}/{rules.length} rules &nbsp;{isOpen?'▲':'▼'}</span>
            </div>
            {isOpen&&rules.map((rule,i)=>(
              <div key={i} className="rule-row">
                <span className="rule-text">{rule.rule}</span>
                <label className="toggle"><input type="checkbox" checked={!!rule.enabled} onChange={()=>toggleRule(g.key,g.lk,i)}/><span className="toggle-track"></span></label>
              </div>
            ))}
          </div>
        );
      })}
      {dirty&&(
        <div className="save-bar">
          <span className="save-note">● Unsaved changes</span>
          <button className="btn-save" onClick={save} disabled={saving}>{saving?'Saving…':'Save Policy'}</button>
        </div>
      )}
    </div>
  );
}

const INTERVALS=[{label:'5 s',ms:5000},{label:'15 s',ms:15000},{label:'30 s',ms:30000},{label:'1 min',ms:60000},{label:'5 min',ms:300000}];

function Audit({audit,onRefresh,autoRefresh,setAutoRefresh,refreshMs,setRefreshMs}) {
  const [q,setQ]=useState(''); const [f,setF]=useState('ALL');
  const rows=useMemo(()=>{let d=audit||[];if(f!=='ALL')d=d.filter(e=>e.action===f);if(q){const ql=q.toLowerCase();d=d.filter(e=>['rule_matched','direction','payload_snippet'].some(k=>(e[k]||'').toLowerCase().includes(ql)));}return d;},[audit,q,f]);
  return (
    <div>
      <div className="search-bar">
        <input className="search-input" placeholder="Search rule, direction, payload…" value={q} onChange={e=>setQ(e.target.value)} />
        {['ALL','BLOCKED','REDACTED','ALLOWED'].map(ff=><button key={ff} className={`filter-btn ${f===ff?'on':''}`} onClick={()=>setF(ff)}>{ff}</button>)}
        <button className="filter-btn" onClick={onRefresh} title="Manual refresh">↻</button>
        {/* ── Auto-refresh controls ── */}
        <button
          className={`filter-btn ${autoRefresh?'on':''}`}
          onClick={()=>setAutoRefresh(o=>!o)}
          title={autoRefresh?'Auto-refresh on — click to stop':'Auto-refresh off — click to start'}>
          {autoRefresh?'⟳ AUTO':'AUTO'}
        </button>
        <select
          className="interval-select"
          value={refreshMs}
          onChange={e=>setRefreshMs(+e.target.value)}
          title="Auto-refresh interval"
          style={{opacity:autoRefresh?1:.5}}>
          {INTERVALS.map(i=><option key={i.ms} value={i.ms}>{i.label}</option>)}
        </select>
        {autoRefresh&&<span className="auto-indicator">live</span>}
      </div>
      <div className="tbl-wrap"><table>
        <thead><tr><th>#</th><th>Timestamp</th><th>Direction</th><th>Action</th><th>Rule Matched</th><th>Payload</th></tr></thead>
        <tbody>
          {!rows.length&&<tr><td colSpan="6" className="empty">No events match.</td></tr>}
          {rows.map(e=>(
            <tr key={e.id}>
              <td style={{color:'var(--muted)'}}>{e.id}</td>
              <td style={{color:'var(--dim)',whiteSpace:'nowrap',fontSize:11}}>{(e.timestamp||'').replace('T',' ').slice(0,19)}</td>
              <td><span className="badge badge-req">{e.direction}</span></td>
              <td><span className={`badge badge-${(e.action||'').toLowerCase()}`}>{e.action}</span></td>
              <td className="trunc" style={{fontSize:11,color:'var(--dim)'}}>{e.rule_matched}</td>
              <td className="trunc" style={{fontSize:11,color:'var(--muted)'}}>{e.payload_snippet}</td>
            </tr>
          ))}
        </tbody>
      </table></div>
    </div>
  );
}

function Firewall({fw}) {
  if(!fw) return <div className="empty loading">Loading firewall…</div>;
  const domains=fw.allowed_domains||[];
  return (
    <div>
      <div className="section-hdr" style={{marginBottom:12}}><span className="section-title">Allowed Egress Domains</span><span className="section-count">{domains.length} domains</span></div>
      <div className="tbl-wrap">
        {domains.map((d,i)=><div key={i} className="fw-row"><span className="fw-dot"></span><span style={{fontSize:12,fontFamily:'var(--font)'}}>{d}</span></div>)}
        {!domains.length&&<div className="empty">No domains whitelisted.</div>}
      </div>
      <p style={{marginTop:12,fontSize:11,color:'var(--dim)'}}>All other outbound traffic is dropped by iptables. Edit <code>firewall.yaml</code> to update.</p>
    </div>
  );
}

function Skills({skills}) {
  if(!skills) return <div className="empty loading">Loading skills…</div>;
  if(!skills.length) return <div className="empty">No skills loaded. Add directories under <code>./skills/</code> and restart.</div>;
  return (
    <div>
      <div className="section-hdr" style={{marginBottom:14}}><span className="section-title">Active Skills</span><span className="section-count">{skills.length} loaded</span></div>
      <div className="skills-grid">
        {skills.map(s=>(
          <div key={s.id} className="skill-card">
            <div className="skill-name">{s.name}</div>
            <div className="skill-desc">{s.description}</div>
            <div className="skill-meta">{s.docs} knowledge docs</div>
            <div className="skill-id">{s.id}</div>
          </div>
        ))}
      </div>
      <p style={{marginTop:16,fontSize:11,color:'var(--dim)'}}>Activate via <code>X-AgentArmor-Skill: &lt;id&gt;</code> header, or let keyword auto-detection pick from message content.</p>
    </div>
  );
}

function CmdK({open,onClose,onNav,onRefreshAudit}) {
  const [q,setQ]=useState(''); const inputRef=useRef();
  useEffect(()=>{if(open){setQ('');setTimeout(()=>inputRef.current?.focus(),40);}},[open]);
  useEffect(()=>{const h=e=>{if(e.key==='Escape')onClose();};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);},[onClose]);
  const nav=id=>{onNav(id);onClose();};
  const all=[
    {g:'Navigate',items:[{icon:'◉',label:'Health Overview',sub:'01',fn:()=>nav('health')},{icon:'⚙',label:'Policy Rules',sub:'02',fn:()=>nav('policy')},{icon:'☰',label:'Audit Log',sub:'03',fn:()=>nav('audit')},{icon:'⊞',label:'Firewall',sub:'04',fn:()=>nav('firewall')},{icon:'🎓',label:'Skills',sub:'05',fn:()=>nav('skills')}]},
    {g:'Actions',items:[{icon:'↻',label:'Refresh audit log',sub:'reload',fn:()=>{onRefreshAudit();onClose();}}]},
  ];
  const ql=q.toLowerCase();
  const filtered=all.map(g=>({...g,items:g.items.filter(i=>!q||i.label.toLowerCase().includes(ql))})).filter(g=>g.items.length);
  if(!open) return null;
  return (
    <div className="cmdk-overlay" onClick={onClose}>
      <div className="cmdk-box" onClick={e=>e.stopPropagation()}>
        <div className="cmdk-iw">
          <span className="cmdk-icon">⌘</span>
          <input ref={inputRef} className="cmdk-input" placeholder="Search commands…" value={q} onChange={e=>setQ(e.target.value)} />
          <span style={{color:'var(--muted)',fontSize:11}}>ESC</span>
        </div>
        <div className="cmdk-list">
          {filtered.map(g=>(
            <div key={g.g}>
              <div className="cmdk-gl">{g.g}</div>
              {g.items.map((item,i)=><div key={i} className="cmdk-item" onClick={item.fn}><span className="cmdk-ii">{item.icon}</span><span className="cmdk-il">{item.label}</span><span className="cmdk-is">{item.sub}</span></div>)}
            </div>
          ))}
          {!filtered.length&&<div className="empty">No commands match.</div>}
        </div>
        <div className="cmdk-footer"><span><kbd>↑↓</kbd> navigate</span><span><kbd>↵</kbd> select</span><span><kbd>esc</kbd> close</span></div>
      </div>
    </div>
  );
}

function App() {
  const [role,setRole]=useState(null); const [tab,setTab]=useState('health'); const [cmdk,setCmdk]=useState(false);
  const [stats,setStats]=useState(null); const [audit,setAudit]=useState([]); const [fw,setFw]=useState(null); const [skills,setSkills]=useState(null);
  const [autoRefresh,setAutoRefresh]=useState(false); const [refreshMs,setRefreshMs]=useState(15000);
  useEffect(()=>{const h=e=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();setCmdk(o=>!o);}};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);},[]);
  const loadStats=useCallback(()=>apiFetch('stats').then(r=>r.json()).then(setStats).catch(()=>{}),[]);
  const loadAudit=useCallback(()=>apiFetch('audit?limit=200').then(r=>r.json()).then(d=>setAudit(Array.isArray(d)?d:[])).catch(()=>{}),[]);
  const loadFw=useCallback(()=>apiFetch('firewall').then(r=>r.json()).then(setFw).catch(()=>{}),[]);
  const loadSkills=useCallback(()=>apiFetch('skills').then(r=>r.json()).then(d=>setSkills(Array.isArray(d)?d:[])).catch(()=>setSkills([])),[]);
  useEffect(()=>{if(!role)return;loadStats();loadAudit();loadFw();loadSkills();const t=setInterval(loadStats,12000);return()=>clearInterval(t);},[role]);
  useEffect(()=>{
    if(!role||!autoRefresh)return;
    const t=setInterval(()=>{loadAudit();loadStats();},refreshMs);
    return()=>clearInterval(t);
  },[role,autoRefresh,refreshMs,loadAudit,loadStats]);
  const rps=useMemo(()=>{if(!stats?.total||!stats?.uptime)return'—';return(stats.total/Math.max(1,parseUptimeSec(stats.uptime))).toFixed(2);},[stats]);
  const tabs=[{id:'health',num:'01',label:'Health'},{id:'policy',num:'02',label:'Policy'},{id:'audit',num:'03',label:'Audit Log',count:audit.length},{id:'firewall',num:'04',label:'Firewall',count:fw?.allowed_domains?.length},{id:'skills',num:'05',label:'Skills',count:skills?.length}];
  if(!role) return <Auth onAuth={r=>setRole(r)} />;
  return (
    <div className="app">
      <header className="hdr">
        <div className="hdr-left">
          <div className="brand"><span className="brand-mark">AA</span><span className="brand-name">Agent<em>Armor</em></span></div>
          <span className="brand-env">PROD &middot; container</span>
        </div>
        <div className="hdr-mid">
          <button className="kbd-hint" onClick={()=>setCmdk(true)}>
            <span style={{color:'var(--dim)'}}>⌘</span>
            <span>Search &middot; jump &middot; run</span>
            <kbd>&#8984;K</kbd>
          </button>
        </div>
        <div className="hdr-right">
          <div className="status">
            <span className="led"></span>
            <span><b>Proxy active</b><span className="sep"> &middot; </span>{stats?.uptime??'…'}<span className="sep"> &middot; </span>{rps}/s</span>
          </div>
          <span className="role-badge">{role}</span>
          <button className="logout-btn" onClick={()=>{_tok='';setRole(null);}}>Logout</button>
          <div className="user"><span className="user-avatar">OP</span><span>ops@armor</span></div>
        </div>
      </header>
      <Ticker events={audit} />
      <nav className="tabs">
        {tabs.map(t=>(
          <button key={t.id} className={`tab ${tab===t.id?'on':''}`} onClick={()=>setTab(t.id)}>
            <span className="tab-num">{t.num}</span>
            <span>{t.label}</span>
            {t.count!=null&&<span className="tab-badge">{t.count}</span>}
          </button>
        ))}
      </nav>
      <main className="main">
        {tab==='health'&&<Health stats={stats} audit={audit} />}
        {tab==='policy'&&<Policy role={role} />}
        {tab==='audit'&&<Audit audit={audit} onRefresh={loadAudit} autoRefresh={autoRefresh} setAutoRefresh={setAutoRefresh} refreshMs={refreshMs} setRefreshMs={setRefreshMs} />}
        {tab==='firewall'&&<Firewall fw={fw} />}
        {tab==='skills'&&<Skills skills={skills} />}
      </main>
      <CmdK open={cmdk} onClose={()=>setCmdk(false)} onNav={setTab} onRefreshAudit={loadAudit} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
