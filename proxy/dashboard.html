/* ═══ CMDK ═══ */
function CmdK({open,onClose,onNavigate}){
  const[q,setQ]=useState('');
  const ref=useRef();
  useEffect(()=>{if(open){setQ('');setTimeout(()=>ref.current?.focus(),40);}}, [open]);
  useEffect(()=>{const h=e=>{if(e.key==='Escape')onClose();};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);},[onClose]);
  const nav=id=>{onNavigate(id);onClose();};
  const all=[
    {g:'Navigate',items:[
      {icon:'◉',label:'Health Overview',sub:'01',fn:()=>nav('health')},
      {icon:'⚙',label:'Policy Rules',sub:'02',fn:()=>nav('policy')},
      {icon:'☰',label:'Audit Log',sub:'03',fn:()=>nav('audit')},
      {icon:'⊞',label:'Firewall',sub:'04',fn:()=>nav('firewall')},
      {icon:'🎓',label:'Skills',sub:'05',fn:()=>nav('skills')},
    ]},
  ];
  const ql=q.toLowerCase();
  const filtered=all.map(g=>({...g,items:g.items.filter(i=>!q||i.label.toLowerCase().includes(ql))})).filter(g=>g.items.length);
  if(!open)return null;
  return(
    <div className="cmdk-overlay" onClick={onClose}>
      <div className="cmdk-box" onClick={e=>e.stopPropagation()}>
        <div className="cmdk-search-row">
          <span className="cmdk-icon">◎</span>
          <input ref={ref} className="cmdk-input" placeholder="Search · jump · run" value={q} onChange={e=>setQ(e.target.value)}/>
          <span className="cmdk-esc">ESC</span>
        </div>
        <div className="cmdk-list">
          {filtered.map(g=>(
            <div key={g.g}>
              <div className="cmdk-group-label">{g.g}</div>
              {g.items.map((item,i)=>(
                <div key={i} className="cmdk-item" onClick={item.fn}>
                  <span className="cmdk-item-icon">{item.icon}</span>
                  <span className="cmdk-item-label">{item.label}</span>
                  <span className="cmdk-item-sub">{item.sub}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
        <div className="cmdk-footer"><span><kbd>↑↓</kbd> navigate</span><span><kbd>↵</kbd> select</span><span><kbd>esc</kbd> close</span></div>
      </div>
    </div>
  );
}

/* ═══ REPAVE ═══ */
function Repave({role}){
  const[killing,setKilling]=useState(false);
  const[killResult,setKillResult]=useState(null);
  const[rotating,setRotating]=useState(false);
  const[rotateResult,setRotateResult]=useState(null);
  const[snapshots,setSnapshots]=useState(null);
  const[restoring,setRestoring]=useState(null);
  const[restoreResult,setRestoreResult]=useState(null);
  const[alerts,setAlerts]=useState([]);
  const[anomaly,setAnomaly]=useState([]);
  const[approvals,setApprovals]=useState([]);
  const[actioningApproval,setActioningApproval]=useState(null);

  useEffect(()=>{
    loadSnaps();loadAlerts();loadAnomaly();loadApprovals();
    const t=setInterval(()=>{loadAlerts();loadAnomaly();loadApprovals();},4000);
    return()=>clearInterval(t);
  },[]);
  const loadSnaps=()=>api('snapshots').then(r=>r.json()).then(d=>setSnapshots(Array.isArray(d)?d:[])).catch(()=>setSnapshots([]));
  const loadAlerts=()=>api('alerts').then(r=>r.json()).then(d=>setAlerts(Array.isArray(d)?d:[])).catch(()=>{});
  const loadAnomaly=()=>api('sessions/anomaly').then(r=>r.json()).then(d=>setAnomaly(Array.isArray(d)?d:[])).catch(()=>{});
  const loadApprovals=()=>api('approvals').then(r=>r.json()).then(d=>setApprovals(Array.isArray(d)?d:[])).catch(()=>{});
  const dismissAlerts=()=>api('alerts/dismiss',{method:'POST'}).then(()=>loadAlerts());
  const approveReq=async(id)=>{setActioningApproval(id);await api('approvals/approve',{method:'POST',body:JSON.stringify({id})});await loadApprovals();setActioningApproval(null);};
  const denyReq=async(id)=>{setActioningApproval(id);await api('approvals/deny',{method:'POST',body:JSON.stringify({id})});await loadApprovals();setActioningApproval(null);};

  const killSessions=async()=>{
    setKilling(true);setKillResult(null);
    try{const r=await api('sessions/kill',{method:'POST'});const d=await r.json();setKillResult(d);}
    catch(e){setKillResult({error:String(e)});}
    setKilling(false);
  };

  const rotateCanary=async()=>{
    setRotating(true);setRotateResult(null);
    try{const r=await api('canary/rotate',{method:'POST'});const d=await r.json();setRotateResult(d);}
    catch(e){setRotateResult({error:String(e)});}
    setRotating(false);
  };

  const restoreSnap=async(id)=>{
    setRestoring(id);setRestoreResult(null);
    try{const r=await api('snapshots/restore',{method:'POST',body:JSON.stringify({id})});const d=await r.json();setRestoreResult(d);await loadSnaps();}
    catch(e){setRestoreResult({error:String(e)});}
    setRestoring(null);
  };

  const isAdmin=role==='admin';

  const ActionCard=({title,sub,desc,btnLabel,onClick,loading,result,danger})=>(
    <div style={{border:'1px solid var(--b1)',borderRadius:'var(--r)',padding:20,background:'var(--s1)',marginBottom:12}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:16}}>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--t1)',marginBottom:3}}>{title}</div>
          <div style={{fontSize:10,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--t3)',marginBottom:8}}>{sub}</div>
          <div style={{fontSize:11,color:'var(--t3)',lineHeight:1.6}}>{desc}</div>
          {result&&(
            <div style={{marginTop:10,padding:'6px 10px',borderRadius:'var(--r)',fontSize:11,
              background:result.error?'var(--red-d)':'var(--green-d)',
              border:`1px solid ${result.error?'rgba(239,68,68,.3)':'rgba(34,197,94,.25)'}`,
              color:result.error?'var(--red)':'var(--green)'}}>
              {result.error
                ?'⚠ '+result.error
                :result.terminated!=null?`✓ Terminated ${result.terminated} session(s) · history cleared`
                :result.rotated?`✓ Canary rotated · prefix: ${result.prefix}`
                :result.restored!=null?`✓ Snapshot #${result.restored} restored · policy hot-reloading`
                :'✓ Done'}
            </div>
          )}
        </div>
        {isAdmin?(
          <button onClick={onClick} disabled={loading}
            style={{padding:'8px 18px',borderRadius:'var(--r)',border:`1px solid ${danger?'var(--red)':'var(--b3)'}`,
              background:danger?'var(--red-d)':'var(--s2)',color:danger?'var(--red)':'var(--t2)',
              fontSize:12,fontWeight:600,whiteSpace:'nowrap',cursor:loading?'default':'pointer',opacity:loading?.6:1,transition:'all .15s',flexShrink:0}}>
            {loading?'Working…':btnLabel}
          </button>
        ):(
          <span style={{fontSize:10,color:'var(--t3)',padding:'4px 8px',border:'1px solid var(--b2)',borderRadius:3}}>Admin only</span>
        )}
      </div>
    </div>
  );

  return(
    <div>
      <div style={{padding:'24px 24px 0'}}>
        <div className="page-label"><span className="page-label-dot"/><span>Repave</span><span>·</span><span>Assume Breach · Survive &amp; Repave</span></div>
        <h1 className="page-headline" style={{marginBottom:8}}>Clean state in <span className="accent">under a second</span>.</h1>
        <p style={{fontSize:12,color:'var(--t3)',marginBottom:28,maxWidth:560,lineHeight:1.7}}>
          Repave assumes that remediation is slower and riskier than rebuilding from a known-good state.
          These three controls let you destroy compromised session state, invalidate captured canary tokens,
          and restore a verified policy — without restarting the container.
        </p>
      </div>
      <div style={{padding:'0 24px'}}>
        {/* ── Zero-Trust Tool Approvals ── */}
        <div className="section-hdr" style={{marginTop:approvals.length?0:0}}><span className="sec-title">Zero-Trust Tool Approvals</span><span className="sec-meta">{approvals.filter(a=>a.status==='pending').length} pending</span></div>
        {approvals.length===0
          ?<p style={{fontSize:11,color:'var(--t3)',marginBottom:20,lineHeight:1.6}}>No approval requests yet. When an agent calls a high-risk tool (<code>exec</code>, <code>browser</code>, <code>sessions_spawn</code>) for the first time, the request appears here for admin sign-off.</p>
          :<div style={{border:'1px solid var(--b1)',borderRadius:'var(--r)',overflow:'hidden',marginBottom:20}}>
            <div style={{display:'grid',gridTemplateColumns:'80px 1fr 90px 70px 130px',padding:'6px 12px',background:'var(--s1)',borderBottom:'1px solid var(--b2)',fontSize:9,letterSpacing:'.07em',textTransform:'uppercase',color:'var(--t3)',gap:12}}>
              <span>Time</span><span>Session</span><span>Tool</span><span>Status</span><span></span>
            </div>
            {approvals.sort((a,b)=>a.status==='pending'?-1:1).map(a=>{
              const sc=a.status==='approved'?'var(--green)':a.status==='denied'?'var(--red)':'var(--yellow)';
              return(
                <div key={a.id} style={{display:'grid',gridTemplateColumns:'80px 1fr 90px 70px 130px',alignItems:'center',padding:'9px 12px',borderBottom:'1px solid var(--b1)',gap:12,background:a.status==='pending'?'rgba(234,179,8,.04)':''}}>
                  <span style={{fontSize:10,color:'var(--t3)'}}>{(a.requested_at||'').slice(11,19)}</span>
                  <span style={{fontSize:11,fontFamily:'monospace',color:'var(--t2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.session_key}</span>
                  <span style={{fontSize:12,fontFamily:'monospace',fontWeight:a.status==='pending'?700:400,color:a.status==='pending'?'var(--yellow)':'var(--t3)'}}>{a.tool}</span>
                  <span style={{fontSize:10,color:sc,fontWeight:600,textTransform:'uppercase'}}>{a.status}</span>
                  {isAdmin&&a.status==='pending'?(
                    <div style={{display:'flex',gap:5}}>
                      <button disabled={actioningApproval===a.id} onClick={()=>approveReq(a.id)}
                        style={{padding:'3px 9px',borderRadius:'var(--r)',border:'1px solid rgba(34,197,94,.4)',background:'rgba(34,197,94,.08)',color:'var(--green)',fontSize:11,cursor:'pointer',fontWeight:600,transition:'all .15s'}}>
                        ✓ Approve
                      </button>
                      <button disabled={actioningApproval===a.id} onClick={()=>denyReq(a.id)}
                        style={{padding:'3px 9px',borderRadius:'var(--r)',border:'1px solid rgba(239,68,68,.35)',background:'rgba(239,68,68,.08)',color:'var(--red)',fontSize:11,cursor:'pointer',fontWeight:600,transition:'all .15s'}}>
                        ✕ Deny
                      </button>
                    </div>
                  ):<span/>}
                </div>
              );
            })}
          </div>
        }

        <div className="section-hdr"><span className="sec-title">Session Kill Switch</span><span className="sec-meta">Survive — instant session wipe</span></div>
        <ActionCard
          title="Kill All Active Sessions"
          sub="POST /armor/api/sessions/kill"
          desc="Closes every live WebSocket connection with a controlled shutdown frame and clears all in-memory session history. Agents currently in-flight receive a close frame and must reconnect. Equivalent to a hard session wipe without a container restart."
          btnLabel="Kill All Sessions"
          onClick={killSessions} loading={killing} result={killResult} danger={true}
        />

        {/* ── Security Alerts ── */}
        {alerts.filter(a=>!a.read).length>0&&(
          <div style={{marginBottom:20,padding:14,border:'1px solid rgba(239,68,68,.35)',borderLeft:'3px solid var(--red)',borderRadius:'var(--r)',background:'var(--red-d)'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
              <span style={{fontSize:11,fontWeight:700,color:'var(--red)',letterSpacing:'.06em',textTransform:'uppercase'}}>
                🚨 {alerts.filter(a=>!a.read).length} Active Alert{alerts.filter(a=>!a.read).length!==1?'s':''}
              </span>
              <button onClick={dismissAlerts} style={{fontSize:10,color:'var(--t3)',padding:'2px 8px',border:'1px solid var(--b2)',borderRadius:'var(--r)',cursor:'pointer',background:'transparent'}}>
                Dismiss all
              </button>
            </div>
            {alerts.filter(a=>!a.read).map(a=>(
              <div key={a.id} style={{marginBottom:6,paddingBottom:6,borderBottom:'1px solid rgba(239,68,68,.2)'}}>
                <div style={{display:'flex',gap:8,alignItems:'baseline',marginBottom:2}}>
                  <span style={{fontSize:9,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--red)',fontWeight:700}}>{a.type}</span>
                  <span style={{fontSize:10,color:'var(--t3)'}}>{a.timestamp}</span>
                </div>
                <div style={{fontSize:11,color:'var(--t2)'}}>{a.message}</div>
              </div>
            ))}
          </div>
        )}

        {/* ── Session Anomaly Scores ── */}
        {anomaly.length>0&&(
          <div style={{marginBottom:20}}>
            <div className="section-hdr"><span className="sec-title">Active Session Anomaly Scores</span><span className="sec-meta">{anomaly.length} session(s) tracked</span></div>
            <div style={{border:'1px solid var(--b1)',borderRadius:'var(--r)',overflow:'hidden'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 80px 60px auto',padding:'6px 12px',background:'var(--s1)',borderBottom:'1px solid var(--b2)',fontSize:9,letterSpacing:'.07em',textTransform:'uppercase',color:'var(--t3)',gap:12}}>
                <span>Session</span><span>Score</span><span>Events</span><span>Flags</span>
              </div>
              {anomaly.map((s,i)=>{
                const pct=Math.round(s.anomaly_score*100);
                const color=pct>=90?'var(--red)':pct>=34?'var(--yellow)':'var(--green)';
                return(
                  <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 80px 60px auto',alignItems:'center',padding:'8px 12px',borderBottom:'1px solid var(--b1)',gap:12}}>
                    <span style={{fontSize:11,fontFamily:'monospace',color:'var(--t3)'}}>{s.session_key}</span>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <div style={{flex:1,height:4,background:'var(--b1)',borderRadius:2}}>
                        <div style={{height:4,width:`${pct}%`,background:color,borderRadius:2,transition:'width .4s'}}/>
                      </div>
                      <span style={{fontSize:10,color,fontWeight:700,width:32,textAlign:'right'}}>{pct}%</span>
                    </div>
                    <span style={{fontSize:11,color:'var(--t3)'}}>{s.event_count}</span>
                    <span style={{fontSize:10,color:'var(--t3)',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{(s.anomaly_flags||[]).join(' · ')||'—'}</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        <div className="section-hdr" style={{marginTop:20}}><span className="sec-title">GoalLock Canary Rotation</span><span className="sec-meta">Assume Breach — invalidate captured anchors</span></div>
        <ActionCard
          title="Rotate Runtime Canary"
          sub="POST /armor/api/canary/rotate"
          desc="Generates a new ARMOR-CANARY token mid-run. The old canary is immediately invalidated — any attacker who captured it can no longer use it to bypass exfiltration detection. The new token is injected into the next system prompt automatically. No restart required."
          btnLabel="Rotate Canary"
          onClick={rotateCanary} loading={rotating} result={rotateResult} danger={false}
        />

        <div className="section-hdr" style={{marginTop:20}}><span className="sec-title">Policy Snapshots</span><span className="sec-meta">Repave — restore known-good policy</span></div>
        <p style={{fontSize:11,color:'var(--t3)',marginBottom:12,lineHeight:1.6}}>
          Every policy save is automatically checkpointed. Restore any snapshot to roll back to a known-good state — the file watcher picks up the change within seconds.
        </p>
        {!snapshots?<div className="empty loading">Loading snapshots…</div>
        :!snapshots.length?<div style={{fontSize:11,color:'var(--t3)',padding:'16px 0'}}>No snapshots yet — save the policy from the Policy tab to create the first checkpoint.</div>
        :(
          <div style={{border:'1px solid var(--b1)',borderRadius:'var(--r)',overflow:'hidden'}}>
            <div style={{display:'grid',gridTemplateColumns:'40px 1fr 140px 120px',padding:'7px 12px',background:'var(--s1)',borderBottom:'1px solid var(--b2)'}}>
              {['#','Timestamp','Label',''].map(h=><span key={h} style={{fontSize:9,letterSpacing:'.07em',textTransform:'uppercase',color:'var(--t3)'}}>{h}</span>)}
            </div>
            {snapshots.map(s=>(
              <div key={s.id} style={{display:'grid',gridTemplateColumns:'40px 1fr 140px 120px',alignItems:'center',padding:'8px 12px',borderBottom:'1px solid var(--b1)',transition:'background .1s'}}
                onMouseEnter={e=>e.currentTarget.style.background='var(--s2)'}
                onMouseLeave={e=>e.currentTarget.style.background=''}>
                <span style={{fontSize:11,color:'var(--t3)'}}>{s.id}</span>
                <span style={{fontSize:11,color:'var(--t2)'}}>{s.timestamp}</span>
                <span style={{fontSize:10,color:'var(--t3)'}}>{s.label||'—'}</span>
                {isAdmin?(
                  <button onClick={()=>restoreSnap(s.id)} disabled={restoring===s.id}
                    style={{padding:'3px 10px',border:'1px solid var(--b2)',borderRadius:'var(--r)',fontSize:11,color:'var(--t2)',background:'var(--s2)',cursor:'pointer',transition:'all .15s'}}
                    onMouseEnter={e=>{e.target.style.borderColor='var(--purple)';e.target.style.color='var(--purple)';}}
                    onMouseLeave={e=>{e.target.style.borderColor='var(--b2)';e.target.style.color='var(--t2)';}}>
                    {restoring===s.id?'Restoring…':'Restore →'}
                  </button>
                ):<span/>}
              </div>
            ))}
          </div>
        )}
        {restoreResult&&(
          <div style={{marginTop:10,padding:'7px 12px',borderRadius:'var(--r)',fontSize:11,
            background:restoreResult.error?'var(--red-d)':'var(--green-d)',
            color:restoreResult.error?'var(--red)':'var(--green)',
            border:`1px solid ${restoreResult.error?'rgba(239,68,68,.3)':'rgba(34,197,94,.25)'}`}}>
            {restoreResult.error?'⚠ '+restoreResult.error:`✓ Snapshot #${restoreResult.restored} restored — policy hot-reloading now`}
          </div>
        )}
      </div>
    </div>
  );
}

  const[autoRefresh,setAutoRefresh]=useState(false);
  const[refreshMs,setRefreshMs]=useState(15000);
  const[stats,setStats]=useState(null);
  const[audit,setAudit]=useState([]);
  const[fw,setFw]=useState(null);
  const[skills,setSkills]=useState(null);

  useEffect(()=>{const h=e=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();setCmdkOpen(o=>!o);}};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);},[]);
  useEffect(()=>{const t=setInterval(()=>setNow(Date.now()),4000);return()=>clearInterval(t);},[]);

  const loadStats =useCallback(()=>api('stats').then(r=>r.json()).then(setStats).catch(()=>{}),[]);
  const loadAudit =useCallback(()=>api('audit?limit=200').then(r=>r.json()).then(d=>setAudit(Array.isArray(d)?d:[])).catch(()=>{}),[]);
  const loadFw    =useCallback(()=>api('firewall').then(r=>r.json()).then(setFw).catch(()=>{}),[]);
  const loadSkills=useCallback(()=>api('skills').then(r=>r.json()).then(d=>setSkills(Array.isArray(d)?d:[])).catch(()=>setSkills([])),[]);

  useEffect(()=>{if(!role)return;loadStats();loadAudit();loadFw();loadSkills();const t=setInterval(loadStats,12000);return()=>clearInterval(t);},[role]);
  useEffect(()=>{if(!role||!autoRefresh)return;const t=setInterval(()=>{loadAudit();loadStats();},refreshMs);return()=>clearInterval(t);},[role,autoRefresh,refreshMs,loadAudit,loadStats]);

  const recentBlocks=useMemo(()=>audit.filter(e=>e.action!=='ALLOWED').slice(0,12),[audit]);
  const ruleCount=useMemo(()=>stats?.rule_counts?Object.values(stats.rule_counts).reduce((a,v)=>a+(v||0),0):null,[stats]);
  const rps=useMemo(()=>{if(!stats?.total||!stats?.uptime)return'—';return(stats.total/Math.max(1,parseSec(stats.uptime))).toFixed(1);},[stats]);

  /* matches AgentArmor.html window.AAData shape */
  const data=useMemo(()=>({stats,audit,fw,summary:{rate_per_sec:rps}}),[stats,audit,fw,rps]);

  const tabs=[
    {id:'health',   num:'01',label:'Health'},
    {id:'policy',   num:'02',label:'Policy',  count:ruleCount},
    {id:'audit',    num:'03',label:'Audit Log',count:audit.length},
    {id:'firewall', num:'04',label:'Firewall', count:fw?.allowed_domains?.length},
    {id:'skills',   num:'05',label:'Skills',   count:skills?.length},
    {id:'repave',   num:'06',label:'Repave'},
  ];

  if(!role)return<Auth onAuth={r=>setRole(r)}/>;

  return(
    <div className="app">
      {/* Header — exact AgentArmor.html */}

        <div className="hdr-left">

            <span className="sym">◎</span>
            <span>Search · jump · run</span>
            <kbd>&#8984;K</kbd>
          </button>
        </div>
        <div className="hdr-right">
          <div className="status">
            <span className="led"/>
            <span className="status-text">PROXY ACTIVE</span>
            <span className="status-sep">·</span>
            <span>{stats?.uptime??'…'}</span>
            <span className="status-sep">·</span>
            <span>{rps}/s</span>
          </div>
          <button className="notif-btn" title="Notifications">🔔</button>
          <div className="user">
            <span className="user-avatar">OP</span>
            <span>ops@armor</span>
          </div>
          <button className="logout-btn" onClick={()=>{_tok='';setRole(null);}}>Logout</button>
        </div>
      </header>

      {/* Ticker — exact AgentArmor.html */}
      <Ticker events={data.auditEvents||audit}/>

      {/* Tabs — exact AgentArmor.html */}
      <nav className="tabs">
        {tabs.map(t=>(
          <button key={t.id} className={`tab ${tab===t.id?'on':''}`} onClick={()=>setTab(t.id)}>
            <span className="tab-num">{t.num}</span>
            <span>{t.label}</span>
            {t.count!=null&&<span className="tab-count">{t.count}</span>}
          </button>
        ))}
      </nav>

      {/* Main — exact AgentArmor.html with data-screen-label */}
      <main className="main" data-screen-label={`${tab} screen`}>
        {tab==='health'   &&<Health   data={data} recentBlocks={recentBlocks}/>}
        {tab==='policy'   &&<Policy   role={role}/>}
        {tab==='audit'    &&<Audit    events={audit} onRefresh={loadAudit} autoRefresh={autoRefresh} setAutoRefresh={setAutoRefresh} refreshMs={refreshMs} setRefreshMs={setRefreshMs}/>}
        {tab==='firewall' &&<Firewall fw={fw} audit={audit}/>}
        {tab==='skills'   &&<Skills   skills={skills}/>}
        {tab==='repave'   &&<Repave   role={role}/>}
      </main>

      {/* CmdK — exact AgentArmor.html */}
      <CmdK open={cmdkOpen} onClose={()=>setCmdkOpen(false)} onNavigate={setTab}/>
    </div>

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
