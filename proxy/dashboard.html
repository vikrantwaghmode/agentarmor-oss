<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AgentArmor — Editorial Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--s1:#111;--s2:#161616;--s3:#1c1c1c;
  --b1:#1f1f1f;--b2:#2a2a2a;--b3:#333;
  --t1:#e8e8e8;--t2:#aaa;--t3:#666;
  --purple:#a855f7;--purple-d:rgba(168,85,247,.15);
  --green:#22c55e;--green-d:rgba(34,197,94,.12);
  --red:#ef4444;--red-d:rgba(239,68,68,.14);
  --yellow:#eab308;--yellow-d:rgba(234,179,8,.12);
  --blue:#3b82f6;
  --mono:'JetBrains Mono','Fira Code',Consolas,monospace;
  --serif:'Playfair Display',Georgia,'Times New Roman',serif;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --r:3px;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--mono);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit;font-size:inherit;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:inherit;color:inherit}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--b3);border-radius:2px}

/* ── App grid ── */
.app{display:grid;grid-template-rows:40px 28px 36px 1fr;height:100vh;overflow:hidden}

/* ── Header ── */
.hdr{display:grid;grid-template-columns:auto 1fr auto;align-items:center;padding:0 18px;border-bottom:1px solid var(--b1);background:var(--s1)}
.hdr-left{display:flex;align-items:center;gap:12px}
.brand{display:flex;align-items:center;gap:9px}
.brand-mark{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:5px;overflow:hidden;flex-shrink:0}
.brand-name{font-family:var(--serif);font-style:italic;font-size:15px;font-weight:400;color:var(--t1);letter-spacing:-.2px}
.brand-env{font-size:10px;color:var(--purple);border:1px solid var(--purple);padding:1px 7px;border-radius:10px;letter-spacing:.06em;font-weight:600}
.hdr-mid{display:flex;justify-content:center}
.kbd-hint{display:flex;align-items:center;gap:8px;padding:4px 14px;border:1px solid var(--b2);border-radius:var(--r);color:var(--t3);font-size:12px;background:transparent;transition:all .15s}
.kbd-hint:hover{border-color:var(--b3);color:var(--t2)}
.kbd-hint .sym{color:var(--t3);font-size:11px}
.kbd-hint kbd{font-family:inherit;font-size:10px;color:var(--t3)}
.hdr-right{display:flex;align-items:center;gap:14px}
.status{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--t2)}
.led{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:blink 3s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.status-text{color:var(--t2);font-size:11px;letter-spacing:.04em;font-weight:600}
.status-sep{color:var(--b3)}
.notif-btn{display:flex;align-items:center;justify-content:center;width:24px;height:24px;color:var(--t3);font-size:14px;border-radius:var(--r);transition:color .15s}
.notif-btn:hover{color:var(--t1)}
.user{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--t2)}
.user-avatar{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:var(--b2);border:1px solid var(--b3);border-radius:50%;font-size:9px;font-weight:700;color:var(--t2)}
.logout-btn{font-size:11px;color:var(--t3);padding:2px 8px;border:1px solid var(--b2);border-radius:var(--r);transition:all .15s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

/* ── Ticker ── */
.ticker{display:flex;align-items:center;height:28px;border-bottom:1px solid var(--b1);background:var(--bg);font-size:11px;overflow:hidden}
.ticker-label{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:0 14px;color:var(--t2);border-right:1px solid var(--b2);white-space:nowrap;font-size:11px;font-weight:600;letter-spacing:.06em}
.ticker-label .dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.ticker-wrap{flex:1;overflow:hidden}
.ticker-track{display:flex;white-space:nowrap;animation:scroll-t 60s linear infinite}
.ticker-track:hover{animation-play-state:paused}
.tick-item{padding:0 18px;border-right:1px solid var(--b1);flex-shrink:0;color:var(--t3)}
.tick-time{color:var(--t3)}
.tick-blocked{color:var(--red);font-weight:600}
.tick-redacted{color:var(--yellow);font-weight:600}
.tick-allowed{color:var(--green);font-weight:600}
.tick-sep{color:var(--b3);margin:0 5px}
@keyframes scroll-t{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ── Tabs ── */
.tabs{display:flex;align-items:flex-end;padding:0 18px;border-bottom:1px solid var(--b1);background:var(--s1)}
.tab{display:flex;align-items:center;gap:6px;padding:7px 14px;font-size:12px;color:var(--t3);border-bottom:2px solid transparent;transition:all .15s;position:relative;top:1px;cursor:pointer}
.tab:hover{color:var(--t2)}
.tab.on{color:var(--t1);border-bottom-color:var(--purple)}
.tab-num{font-size:10px;color:var(--t3);margin-right:1px}
.tab.on .tab-num{color:var(--purple);opacity:.7}
.tab-count{font-size:10px;color:var(--t3);background:var(--b1);padding:0 5px;border-radius:8px;min-width:18px;text-align:center}
.tab.on .tab-count{color:var(--purple);background:var(--purple-d)}

/* ── Main ── */
.main{overflow-y:auto}

/* ── Page structure ── */
.page-top{padding:24px 24px 0;margin-bottom:0}
.page-label{display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:14px}
.page-label-dot{width:6px;height:6px;border-radius:50%;background:var(--purple)}
.page-headline{font-family:var(--serif);font-style:italic;font-weight:400;font-size:40px;line-height:1.18;color:var(--t1);margin-bottom:0}
.page-headline .accent{color:var(--purple)}
.page-headline .red{color:var(--red)}
.page-headline .yel{color:var(--yellow)}
.page-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;font-size:10px;color:var(--t3)}
.page-meta-row{display:flex;gap:8px;align-items:center}
.page-meta-label{color:var(--t3);letter-spacing:.06em}
.page-meta-val{color:var(--t2)}

/* ── Two-column layout ── */
.two-col{display:grid;grid-template-columns:1fr 300px;gap:0}
.col-main{padding:24px;border-right:1px solid var(--b1)}
.col-side{padding:24px;overflow-y:auto}
@media(max-width:900px){.two-col{grid-template-columns:1fr}.col-side{border-top:1px solid var(--b1)}}

/* ── Section headers ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--t3)}
.sec-meta{font-size:10px;color:var(--t3)}
.sec-meta .hi{color:var(--t2)}

/* ── Stat cards ── */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1px;background:var(--b1);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;margin-bottom:20px}
.stat-card{background:var(--s1);padding:14px 16px}
.stat-label{font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.stat-val{font-size:30px;font-weight:700;letter-spacing:-1px;line-height:1}
.stat-val.g{color:var(--green)}.stat-val.r{color:var(--red)}.stat-val.y{color:var(--yellow)}.stat-val.p{color:var(--purple)}
.stat-sub{font-size:10px;color:var(--t3);margin-top:4px}

/* ── Traffic bar ── */
.traffic-bar-wrap{margin-bottom:16px}
.traffic-bar{height:6px;border-radius:3px;display:flex;overflow:hidden;background:var(--b1);margin-bottom:8px}
.traffic-bar-seg{height:100%;transition:width .5s ease}

/* ── Area chart ── */
.chart-wrap{margin-bottom:20px}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.chart-legend{display:flex;gap:14px}
.chart-legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t3)}
.chart-legend-dot{width:8px;height:8px;border-radius:1px}

/* ── Heatmap ── */
.heatmap-wrap{margin-bottom:20px}
.heatmap-grid{display:grid;grid-template-columns:90px 1fr;gap:4px}
.heatmap-row{display:flex;align-items:center;gap:4px;margin-bottom:3px}
.heatmap-label{font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--t3);width:90px;text-align:right;padding-right:8px;line-height:1.2}
.heatmap-cells{display:flex;gap:2px;flex:1}
.heatmap-cell{flex:1;height:14px;border-radius:2px;background:var(--b1);transition:background .3s}
.heatmap-axis{display:flex;justify-content:space-between;font-size:9px;color:var(--t3);margin-left:94px;margin-top:4px}

/* ── Recent blocks sidebar ── */
.recent-title{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--t3);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:blink 2s ease-in-out infinite}
.event-card{padding:10px 0;border-bottom:1px solid var(--b1)}
.event-card:last-child{border-bottom:none}
.event-time{font-size:10px;color:var(--t3);margin-bottom:4px}
.event-rule{font-size:12px;color:var(--t2);margin-bottom:3px;font-weight:600}
.event-payload{font-size:11px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.event-ip{font-size:10px;color:var(--t3);margin-top:2px}

/* ── Badges ── */
.badge{display:inline-block;padding:1px 6px;border-radius:2px;font-size:10px;font-weight:700;letter-spacing:.04em;vertical-align:middle}
.badge-blocked{background:var(--red-d);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.badge-redacted{background:var(--yellow-d);color:var(--yellow);border:1px solid rgba(234,179,8,.3)}
.badge-allowed{background:var(--green-d);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.badge-dir{background:var(--b2);color:var(--t3);font-size:9px}

/* ── Policy ── */
.scanner-section{margin-bottom:0;border-bottom:1px solid var(--b1)}
.scanner-hdr{display:flex;align-items:baseline;justify-content:space-between;padding:18px 0 14px}
.scanner-name{font-family:var(--serif);font-style:italic;font-size:22px;color:var(--t1)}
.scanner-slug{font-size:11px;color:var(--t3);margin-left:10px}
.scanner-stats{display:flex;align-items:center;gap:14px;font-size:11px;color:var(--t3)}
.scanner-hits{color:var(--red)}
.rule-table{width:100%;border-collapse:collapse;margin-bottom:12px}
.rule-table th{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);text-align:left;padding:6px 8px;border-bottom:1px solid var(--b1)}
.rule-table td{padding:7px 8px;border-bottom:1px solid var(--b1);font-size:12px;vertical-align:middle}
.rule-table tr:last-child td{border-bottom:none}
.rule-table tr:hover td{background:var(--s2)}
/* Square toggle for policy */
.sq-toggle{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border:1.5px solid var(--b3);border-radius:2px;cursor:pointer;transition:all .15s;flex-shrink:0;background:var(--bg)}
.sq-toggle.on{background:var(--purple);border-color:var(--purple)}
.sq-toggle.on::after{content:'✓';font-size:9px;color:#fff;font-weight:700}
.rule-pattern{font-family:var(--mono);color:var(--t2);font-size:11px}
.rule-hits{color:var(--t2);font-variant-numeric:tabular-nums}
.rule-last{color:var(--t3);font-size:11px;white-space:nowrap}
.rule-arrow{color:var(--t3);cursor:pointer;padding:0 4px}
.rule-arrow:hover{color:var(--t1)}
.add-rule-row{display:flex;gap:8px;margin-bottom:20px}
.add-rule-input{flex:1;padding:6px 10px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);color:var(--t2);outline:none;font-size:12px;transition:border-color .15s}
.add-rule-input:focus{border-color:var(--purple)}
.add-rule-input::placeholder{color:var(--t3)}
.btn-add{padding:6px 14px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);font-size:12px;color:var(--t2);transition:all .15s;white-space:nowrap}
.btn-add:hover{border-color:var(--purple);color:var(--purple)}
/* Test input */
.test-panel{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);margin-bottom:0;padding:14px}
.test-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.test-live{font-size:10px;color:var(--green)}
.test-textarea{width:100%;height:70px;background:var(--bg);border:1px solid var(--b2);border-radius:var(--r);padding:8px 10px;color:var(--t2);font-size:12px;resize:vertical;outline:none;transition:border-color .15s}
.test-textarea:focus{border-color:var(--b3)}
.test-matches{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;min-height:22px}
.test-match{font-size:10px;padding:2px 8px;background:var(--red-d);border:1px solid rgba(239,68,68,.3);color:var(--red);border-radius:2px}
/* Policy sidebar */
.inspector{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);padding:16px;position:sticky;top:0}
.inspector-title{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
.inspector-path{font-size:10px;color:var(--purple);margin-bottom:14px}
.inspector-rule{font-family:var(--mono);font-size:13px;color:var(--t1);padding:8px;background:var(--bg);border-radius:var(--r);margin-bottom:14px;word-break:break-all}
.inspector-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.inspector-stat{background:var(--s2);padding:10px;border-radius:var(--r)}
.inspector-stat-label{font-size:9px;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
.inspector-stat-val{font-size:20px;font-weight:700;color:var(--t1)}
.inspector-stat-sub{font-size:10px;color:var(--t3)}
.recent-matches-title{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin-bottom:10px}
.match-item{padding:8px 0;border-bottom:1px solid var(--b1);font-size:11px}
.match-item:last-child{border-bottom:none}
.match-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.match-time{color:var(--t3)}
.match-ip{color:var(--t3)}
.match-service{color:var(--t3);font-size:10px}
.match-text{color:var(--t2);line-height:1.4}
.match-highlight{background:rgba(168,85,247,.2);color:var(--purple);border-radius:1px;padding:0 1px}
/* Save bar */
.policy-save-bar{position:sticky;bottom:0;display:flex;align-items:center;justify-content:space-between;padding:10px 24px;background:var(--s1);border-top:1px solid var(--b2);z-index:10}
/* ── Posture config blocks ── */
.posture-block{border:1px solid var(--b1);border-radius:var(--r);margin-bottom:1px;overflow:hidden}
.posture-hdr{display:flex;align-items:baseline;justify-content:space-between;padding:14px 16px 12px;background:var(--s2);cursor:pointer;user-select:none}
.posture-hdr:hover{background:var(--s1)}
.posture-name{font-family:var(--serif);font-style:italic;font-size:18px;color:var(--t1)}
.posture-slug{font-size:11px;color:var(--t3);margin-left:8px}
.posture-body{padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.cfg-row{display:flex;align-items:center;justify-content:space-between;gap:16px}
.cfg-label{font-size:11px;color:var(--t2);flex:1}
.cfg-sub{font-size:10px;color:var(--t3);margin-top:2px}
.cfg-num{width:72px;padding:4px 8px;background:var(--bg);border:1px solid var(--b2);border-radius:var(--r);color:var(--t2);font-size:12px;font-family:var(--mono);text-align:right;outline:none;transition:border-color .15s}
.cfg-num:focus{border-color:var(--purple)}
.cfg-num:disabled{opacity:.4}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tag{display:flex;align-items:center;gap:4px;padding:2px 8px;background:var(--s2);border:1px solid var(--b2);border-radius:10px;font-size:11px;font-family:var(--mono);color:var(--t2)}
.tag-del{cursor:pointer;color:var(--t3);font-size:11px;line-height:1;padding:0 2px;transition:color .15s}
.tag-del:hover{color:var(--red)}
.tag-add{display:flex;gap:6px;margin-top:8px}
.tag-input{flex:1;padding:4px 8px;background:var(--bg);border:1px solid var(--b2);border-radius:var(--r);color:var(--t2);font-size:11px;font-family:var(--mono);outline:none;transition:border-color .15s}
.tag-input:focus{border-color:var(--purple)}
.tag-input::placeholder{color:var(--t3)}
.tag-add-btn{padding:4px 10px;border:1px solid var(--b2);border-radius:var(--r);font-size:11px;color:var(--t2);background:var(--s2);cursor:pointer;transition:all .15s}
.tag-add-btn:hover{border-color:var(--purple);color:var(--purple)}
.ro-val{font-size:12px;color:var(--t2);font-family:var(--mono)}
.save-note{font-size:11px;color:var(--yellow)}
.btn-save{padding:5px 16px;background:var(--purple);color:#fff;border-radius:var(--r);font-size:12px;font-weight:600;transition:opacity .15s}
.btn-save:hover{opacity:.85}.btn-save:disabled{opacity:.35;cursor:default}

/* ── Audit ── */
.audit-search-row{display:flex;align-items:center;gap:8px;padding:16px 24px;border-bottom:1px solid var(--b1);background:var(--s1)}
.audit-search-icon{color:var(--t3);font-size:12px}
.audit-search-input{flex:1;background:none;border:none;outline:none;color:var(--t2);font-size:13px;padding:2px 0}
.audit-search-input::placeholder{color:var(--t3)}
.filter-grp{display:flex;gap:0}
.filter-btn{padding:4px 10px;border:1px solid var(--b2);font-size:10px;color:var(--t3);letter-spacing:.04em;cursor:pointer;transition:all .15s;background:transparent}
.filter-btn:first-child{border-radius:var(--r) 0 0 var(--r)}
.filter-btn:last-child{border-radius:0 var(--r) var(--r) 0}
.filter-btn+.filter-btn{border-left:none}
.filter-btn.on{background:var(--purple);color:#fff;border-color:var(--purple)}
.filter-btn:hover:not(.on){border-color:var(--b3);color:var(--t2)}
.pause-btn{padding:4px 10px;border:1px solid var(--b2);border-radius:var(--r);font-size:10px;color:var(--t3);letter-spacing:.04em;transition:all .15s}
.pause-btn:hover{border-color:var(--b3);color:var(--t2)}
.pause-btn.on{border-color:var(--yellow);color:var(--yellow)}
.audit-table-wrap{overflow:auto}
.audit-table{width:100%;border-collapse:collapse;font-size:12px}
.audit-table th{padding:8px 14px;text-align:left;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);border-bottom:1px solid var(--b1);background:var(--s1);white-space:nowrap;position:sticky;top:0;z-index:1}
.audit-table td{padding:8px 14px;border-bottom:1px solid var(--b1);vertical-align:top;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t2)}
.audit-table tr:hover td{background:var(--s2)}
.audit-table tr:last-child td{border-bottom:none}
.col-time{color:var(--t3);white-space:nowrap;font-size:11px}
.col-dir{white-space:nowrap}
.col-action{white-space:nowrap}
.col-rule{color:var(--t3);font-size:11px}
.col-payload{color:var(--t3);font-size:11px}
.col-client{color:var(--t3);font-size:11px}

/* ── Firewall ── */
.fw-domain-table{width:100%;border-collapse:collapse}
.fw-domain-table th{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);text-align:left;padding:8px 12px;border-bottom:1px solid var(--b1);background:var(--s1)}
.fw-domain-row{display:grid;grid-template-columns:auto 1fr 100px 100px 80px 100px;align-items:center;gap:16px;padding:12px;border-bottom:1px solid var(--b1);transition:background .12s}
.fw-domain-row:last-child{border-bottom:none}
.fw-domain-row:hover{background:var(--s2)}
.fw-led{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;box-shadow:0 0 5px var(--green)}
.fw-host{font-family:var(--mono);font-size:13px;color:var(--t1)}
.fw-tag{font-size:10px;color:var(--t3);letter-spacing:.05em;text-transform:uppercase}
.fw-stat-label{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin-bottom:2px}
.fw-stat-val{font-size:13px;color:var(--t2);font-weight:600}
.fw-stat-sub{font-size:10px;color:var(--t3)}
.fw-sparkline{width:80px;height:24px}
.fw-row-hdr{grid-template-columns:auto 1fr 100px 100px 80px 100px;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);padding:8px 12px;border-bottom:1px solid var(--b2);display:grid;gap:16px;background:var(--s1)}
/* Firewall sidebar */
.deny-item{padding:10px 0;border-bottom:1px solid var(--b1)}
.deny-item:last-child{border-bottom:none}
.deny-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.deny-time{font-size:10px;color:var(--t3)}
.deny-reason{font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--t3)}
.deny-domain{font-family:var(--mono);font-size:13px;color:var(--red);margin-bottom:2px}
.deny-from{font-size:10px;color:var(--t3)}
.policy-note{padding:16px;border:1px solid var(--b2);border-radius:var(--r);margin-top:16px}
.policy-note-title{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.policy-note-body{font-size:11px;color:var(--t3);line-height:1.6}
.policy-note-body code{color:var(--purple);background:var(--purple-d);padding:1px 4px;border-radius:2px;font-family:var(--mono);font-size:10px}

/* ── Auth ── */
.auth-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:2000}
.auth-box{width:360px;border:1px solid var(--b2);border-radius:var(--r);padding:32px;background:var(--s1);display:flex;flex-direction:column;gap:14px}
.auth-brand{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.auth-title{font-size:12px;color:var(--t3)}
.auth-input{padding:8px 10px;background:var(--bg);border:1px solid var(--b2);border-radius:var(--r);color:var(--t2);outline:none;transition:border-color .15s;font-size:13px}
.auth-input:focus{border-color:var(--purple)}
.auth-btn{padding:8px;background:var(--purple);color:#fff;border-radius:var(--r);font-size:12px;font-weight:600;transition:opacity .15s}
.auth-btn:hover{opacity:.85}
.auth-err{font-size:11px;color:var(--red)}

/* ── CmdK ── */
.cmdk-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding-top:10vh}
.cmdk-box{width:520px;max-width:90vw;border:1px solid var(--b3);border-radius:4px;background:var(--s1);overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.7)}
.cmdk-search-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--b1)}
.cmdk-icon{color:var(--t3);font-size:14px}
.cmdk-input{flex:1;background:none;border:none;outline:none;color:var(--t2);font-size:14px;font-family:var(--mono)}
.cmdk-input::placeholder{color:var(--t3)}
.cmdk-esc{font-size:10px;color:var(--t3)}
.cmdk-list{max-height:320px;overflow-y:auto}
.cmdk-group-label{padding:8px 14px 3px;font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--t3)}
.cmdk-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;transition:background .1s}
.cmdk-item:hover{background:var(--s2)}
.cmdk-item-icon{width:16px;text-align:center;font-size:12px;color:var(--t3)}
.cmdk-item-label{font-size:12px;color:var(--t2);flex:1}
.cmdk-item-sub{font-size:10px;color:var(--t3)}
.cmdk-footer{display:flex;gap:16px;padding:7px 14px;border-top:1px solid var(--b1);font-size:10px;color:var(--t3)}
.cmdk-footer kbd{border:1px solid var(--b2);border-radius:2px;padding:0 4px;font-family:inherit}

/* ── Skills ── */
.skills-main{padding:24px}
.skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.skill-card{border:1px solid var(--b2);border-radius:var(--r);padding:16px;background:var(--s1);transition:border-color .15s}
.skill-card:hover{border-color:var(--b3)}
.skill-icon{font-size:20px;margin-bottom:10px}
.skill-name{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:4px}
.skill-desc{font-size:11px;color:var(--t3);margin-bottom:10px;line-height:1.5}
.skill-footer{display:flex;justify-content:space-between;align-items:center}
.skill-docs{font-size:10px;color:var(--t3)}
.skill-id{font-size:10px;color:var(--t3);background:var(--b1);padding:1px 6px;border-radius:2px}

/* ── Misc ── */
.empty{padding:40px;text-align:center;color:var(--t3);font-size:12px}
.loading{animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback,useMemo}=React;
let _tok='';
const api=(p,o={})=>fetch('/armor/api/'+p,{...o,headers:{Authorization:'Bearer '+_tok,'Content-Type':'application/json',...(o.headers||{})}});
const fmt=n=>n==null?'—':Number(n).toLocaleString();
const fmtPct=(a,t)=>t>0?((a/t)*100).toFixed(1)+'%':'—';
const parseSec=s=>{if(!s)return 1;const m=s.match(/(\d+)h(\d+)m(\d+)s/);return m?+m[1]*3600+ +m[2]*60+ +m[3]:1;};
const ago=ts=>{if(!ts)return'—';const s=Math.floor((Date.now()-new Date(ts.replace(' ','T')))/1000);if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';return Math.floor(s/3600)+'h ago';};

/* ═══ Sparkline ═══ */
function Sparkline({data,color='#ef4444',w=80,h=24}){
  if(!data||!data.length)return<svg width={w} height={h}><line x1="4" y1={h/2} x2={w-4} y2={h/2} stroke="#2a2a2a" strokeWidth="1.5"/></svg>;
  const max=Math.max(...data,1);
  const pts=data.map((v,i)=>`${4+(i/(data.length-1))*(w-8)},${h-3-(v/max)*(h-6)}`).join(' ');
  return<svg width={w} height={h}><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round"/></svg>;
}

/* ═══ Heatmap ═══ */
function Heatmap({audit}){
  const cells=useMemo(()=>{
    const N=24,now=Date.now(),bkt=3600000;
    const scanners=['PROMPT\nINJECTION','SECRETS','PII / DLP','MALICIOUS'];
    const keys=['Prompt Injection','Secret Redacted','PII Detected','Malicious Content'];
    const rows=scanners.map(()=>Array(N).fill(0));
    (audit||[]).forEach(e=>{
      const t=new Date((e.timestamp||'').replace(' ','T')).getTime();
      const age=now-t; if(age<0||age>N*bkt)return;
      const idx=Math.floor((N*bkt-age)/bkt); if(idx<0||idx>=N)return;
      keys.forEach((k,ki)=>{if((e.rule_matched||'').includes(k))rows[ki][idx]++;});
    });
    return{scanners,rows};
  },[audit]);
  const maxVal=Math.max(1,...cells.rows.flat());
  const clr=v=>{if(v===0)return'var(--b1)';const i=v/maxVal;return`rgba(239,68,68,${0.15+i*0.7})`};
  return(
    <div className="heatmap-wrap">
      <div className="sec-hdr"><span className="sec-title">Threat Density · Last 24h by Scanner</span></div>
      {cells.scanners.map((s,si)=>(
        <div key={s} className="heatmap-row">
          <div className="heatmap-label">{s}</div>
          <div className="heatmap-cells">{cells.rows[si].map((v,ci)=><div key={ci} className="heatmap-cell" style={{background:clr(v)}} title={v+' events'}/>)}</div>
        </div>
      ))}
      <div className="heatmap-axis"><span>-24h</span><span>-18h</span><span>-12h</span><span>-6h</span><span>now</span></div>
    </div>
  );
}

/* ═══ Area Chart ═══ */
function AreaChart({audit}){
  const data=useMemo(()=>{
    const N=60,bkt=60000,now=Date.now();
    const b=Array.from({length:N},(_,i)=>({allowed:0,redacted:0,blocked:0,t:new Date(now-(N-1-i)*bkt)}));
    (audit||[]).forEach(e=>{
      const t=new Date((e.timestamp||'').replace(' ','T')).getTime();
      const age=now-t; if(age<0||age>N*bkt)return;
      const idx=Math.floor((N*bkt-age)/bkt); if(idx<0||idx>=N)return;
      if(e.action==='BLOCKED')b[idx].blocked++;
      else if(e.action==='REDACTED')b[idx].redacted++;
      else b[idx].allowed++;
    });
    return b;
  },[audit]);
  const W=600,H=120,PAD=8;
  const maxY=Math.max(1,...data.map(d=>d.allowed+d.redacted+d.blocked));
  const sy=v=>H-PAD-(v/maxY)*(H-PAD*2);
  const polyPts=key=>data.map((d,i)=>`${(i/(data.length-1))*W},${sy(d[key])}`).join(' ');
  const area=(pts,h)=>`M0,${h} L${pts} L${W},${h} Z`;
  const aP=polyPts('allowed'),rP=polyPts('redacted'),bP=polyPts('blocked');
  const labels=data.filter((_,i)=>i%12===0||i===data.length-1).map(d=>d.t.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));
  return(
    <div className="chart-wrap">
      <div className="chart-header">
        <span className="sec-title">Events per Minute · Last Hour</span>
        <div className="chart-legend">
          {[['allowed','#22c55e'],['redacted','#eab308'],['blocked','#ef4444']].map(([l,c])=>(
            <div key={l} className="chart-legend-item"><div className="chart-legend-dot" style={{background:c}}/>{l}</div>
          ))}
        </div>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:H,display:'block',borderRadius:'var(--r)',background:'var(--s1)',border:'1px solid var(--b1)'}}>
        {[0,maxY*.25,maxY*.5,maxY*.75,maxY].map(v=>(
          <line key={v} x1="0" y1={sy(v)} x2={W} y2={sy(v)} stroke="#1f1f1f" strokeWidth=".5"/>
        ))}
        <text x="4" y={sy(maxY)+14} fontSize="9" fill="#444">{Math.round(maxY)}</text>
        <text x="4" y={sy(0)-2} fontSize="9" fill="#444">0</text>
        <polygon points={area(aP,H)} fill="rgba(34,197,94,.12)"/>
        <polyline points={aP} fill="none" stroke="#22c55e" strokeWidth="1.5" strokeLinejoin="round"/>
        <polygon points={area(rP,H)} fill="rgba(234,179,8,.1)"/>
        <polyline points={rP} fill="none" stroke="#eab308" strokeWidth="1.5" strokeLinejoin="round"/>
        <polygon points={area(bP,H)} fill="rgba(239,68,68,.12)"/>
        <polyline points={bP} fill="none" stroke="#ef4444" strokeWidth="1.5" strokeLinejoin="round"/>
      </svg>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:4,fontSize:9,color:'var(--t3)'}}>
        {['-60m','-45m','-30m','-15m','now'].map(l=><span key={l}>{l}</span>)}
      </div>
    </div>
  );
}

/* ═══ Ticker ═══ */
function Ticker({events}){
  const items=useMemo(()=>(events||[]).slice(0,24),[events]);
  if(!items.length)return(
    <div className="ticker">
      <div className="ticker-label"><span className="dot"/><span>LIVE FEED</span></div>
      <span style={{padding:'0 16px',fontSize:11,color:'var(--t3)'}}>No events yet — send a request to see activity</span>
    </div>
  );
  const doubled=[...items,...items];
  return(
    <div className="ticker">
      <div className="ticker-label"><span className="dot"/><span>LIVE FEED</span></div>
      <div className="ticker-wrap">
        <div className="ticker-track">
          {doubled.map((e,i)=>{
            const a=(e.action||'').toLowerCase();
            const cls=a==='blocked'?'tick-blocked':a==='redacted'?'tick-redacted':'tick-allowed';
            return(
              <span key={i} className="tick-item">
                <span className="tick-time">{(e.timestamp||'').slice(11,19)}</span>
                <span className="tick-sep">·</span>
                <span className={cls}>{e.action}</span>
                <span className="tick-sep">{e.rule_matched||'—'}</span>
                <span className="tick-sep">·</span>
                <span className="tick-time">{e.direction}</span>
              </span>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ═══ HEALTH ═══ */
function Health({data,recentBlocks}){
  const{stats,audit}=data;
  const total=stats?.total||0,blocked=stats?.blocked||0,redacted=stats?.redacted||0,allowed=stats?.allowed||0;
  const blockPct=fmtPct(blocked,total),redactPct=fmtPct(redacted,total),allowPct=fmtPct(allowed,total);
  const uptime=stats?.uptime||'—';
  const rps=total>0?(total/Math.max(1,parseSec(uptime))).toFixed(1):'—';
  const headline=blocked>total*.1
    ?"All systems nominal, but prompt-injection attempts are <span class='accent'>spiking</span>."
    :total>0?"All systems are <span class='accent'>nominal</span>, traffic flowing cleanly."
    :"Proxy <span class='accent'>active</span> and scanning all traffic.";
  return(
    <div>
      <div className="two-col" style={{minHeight:'calc(100vh - 144px)'}}>
        <div className="col-main">
          <div className="page-label"><span className="page-label-dot"/><span>Health</span><span>·</span><span>Last 60 Minutes</span></div>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:28}}>
            <h1 className="page-headline" dangerouslySetInnerHTML={{__html:headline}}/>
            <div className="page-meta">
              <div className="page-meta-row"><span className="page-meta-label">UPTIME</span><span className="page-meta-val">{uptime}</span></div>
              <div className="page-meta-row"><span className="page-meta-label">RATE</span><span className="page-meta-val">{rps}/s</span></div>
            </div>
          </div>
          <div className="sec-hdr">
            <span className="sec-title">Total Events · Last 24h</span>
            <span className="sec-meta"><span className="hi">{fmt(total)}</span> total</span>
          </div>
          <div className="traffic-bar-wrap">
            <div className="traffic-bar">
              <div className="traffic-bar-seg" style={{width:allowPct,background:'var(--green)',opacity:.7}}/>
              <div className="traffic-bar-seg" style={{width:redactPct,background:'var(--yellow)',opacity:.7}}/>
              <div className="traffic-bar-seg" style={{width:blockPct,background:'var(--red)',opacity:.7}}/>
            </div>
          </div>
          <div className="stat-row" style={{marginBottom:24}}>
            <div className="stat-card">
              <div className="stat-label">Allowed</div>
              <div className="stat-val g">{fmt(allowed)}</div>
              <div className="stat-sub">{allowPct} · pass-through</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Redacted</div>
              <div className="stat-val y">{fmt(redacted)}</div>
              <div className="stat-sub">{redactPct} · secrets stripped</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Blocked</div>
              <div className="stat-val r">{fmt(blocked)}</div>
              <div className="stat-sub">{blockPct} · dropped before model</div>
            </div>
          </div>
          <AreaChart audit={audit}/>
          <Heatmap audit={audit}/>
        </div>
        <div className="col-side">
          <div className="recent-title"><span className="live-dot"/><span>Recent Blocks &amp; Redactions</span></div>
          {!recentBlocks.length?<div className="empty" style={{padding:'20px 0',textAlign:'left'}}>No events yet.</div>
          :recentBlocks.map(e=>(
            <div key={e.id} className="event-card">
              <div className="event-time">{(e.timestamp||'').slice(11,19)}</div>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
                <span className={`badge badge-${(e.action||'').toLowerCase()}`}>{e.action}</span>
                <span className="event-rule">{(e.rule_matched||'').slice(0,40)}</span>
              </div>
              <div className="event-payload">{e.payload_snippet||'—'}</div>
              <div className="event-ip">{e.direction}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ═══ POLICY ═══ */
/* ── PostureConfig — editable security posture blocks ── */
function PostureConfig({pol,isAdmin,setField,setTopField,addTool,removeTool}){
  const[open,setOpen]=useState({auto_repave:true,anomaly:false,zero_trust:false,blast:false,webhooks:false,feeds:false});
  const[newTool,setNewTool]=useState('');
  const[testingIdx,setTestingIdx]=useState(null);
  const[testResults,setTestResults]=useState({});
  const testWebhook=async(idx)=>{
    setTestingIdx(idx);
    try{const r=await api('webhook/test',{method:'POST',body:JSON.stringify({index:idx})});const d=await r.json();setTestResults(p=>({...p,[idx]:d}));}
    catch(e){setTestResults(p=>({...p,[idx]:{error:String(e)}}));}
    setTestingIdx(null);
  };
  // Webhook CRUD helpers
  const addWebhook=()=>{
    if(!isAdmin)return;
    setPol(p=>{const n=JSON.parse(JSON.stringify(p));if(!n.webhooks)n.webhooks=[];
      n.webhooks.push({enabled:true,name:'New SIEM',url:'',format:'generic',events:['BLOCKED','REDACTED'],timeout_ms:3000,include_payload:false});return n;});
    setDirty(true);
  };
  const removeWebhook=idx=>{
    if(!isAdmin)return;
    setPol(p=>{const n=JSON.parse(JSON.stringify(p));n.webhooks.splice(idx,1);return n;});setDirty(true);
  };
  const setWebhookField=(idx,field,val)=>{
    if(!isAdmin)return;
    setPol(p=>{const n=JSON.parse(JSON.stringify(p));n.webhooks[idx][field]=val;return n;});setDirty(true);
  };
  const toggleWebhookEvent=(idx,ev)=>{
    if(!isAdmin)return;
    setPol(p=>{const n=JSON.parse(JSON.stringify(p));const evs=n.webhooks[idx].events||[];
      n.webhooks[idx].events=evs.includes(ev)?evs.filter(e=>e!==ev):[...evs,ev];return n;});setDirty(true);
  };
  // Feed CRUD helpers
  const addFeed=()=>{
    if(!isAdmin)return;
    setPol(p=>{const n=JSON.parse(JSON.stringify(p));if(!n.threat_feeds)n.threat_feeds={enabled:true,feeds:[]};if(!n.threat_feeds.feeds)n.threat_feeds.feeds=[];
      n.threat_feeds.feeds.push({enabled:true,name:'New Feed',url:'',scanner:'prompt_injection',interval_minutes:60});return n;});setDirty(true);
  };
  const removeFeed=idx=>{
    if(!isAdmin)return;
    setPol(p=>{const n=JSON.parse(JSON.stringify(p));n.threat_feeds.feeds.splice(idx,1);return n;});setDirty(true);
  };
  const setFeedField=(idx,field,val)=>{
    if(!isAdmin)return;
    setPol(p=>{const n=JSON.parse(JSON.stringify(p));n.threat_feeds.feeds[idx][field]=val;return n;});setDirty(true);
  };
  const sc=pol?.scanners;
  if(!sc)return null;

  const Toggle=({path,checked,top})=>(
    isAdmin
      ?<div className={`sq-toggle ${checked?'on':''}`} onClick={()=>top?setTopField(path,!checked):setField(path,!checked)} style={{cursor:'pointer'}}/>
      :<span className="ro-val">{checked?'enabled':'disabled'}</span>
  );

  const NumInput=({path,value,min=0,max,step=1,note,top})=>(
    isAdmin
      ?<div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:2}}>
          <input type="number" className="cfg-num" value={value??''} min={min} max={max} step={step}
            onChange={e=>top?setTopField(path,+e.target.value):setField(path,+e.target.value)} disabled={!isAdmin}/>
          {note&&<span style={{fontSize:9,color:'var(--t3)'}}>{note}</span>}
        </div>
      :<span className="ro-val">{value}</span>
  );

  const CfgRow=({label,sub,children})=>(
    <div className="cfg-row">
      <div><div className="cfg-label">{label}</div>{sub&&<div className="cfg-sub">{sub}</div>}</div>
      {children}
    </div>
  );

  const Block=({id,name,slug,children})=>(
    <div className="posture-block">
      <div className="posture-hdr" onClick={()=>setOpen(o=>({...o,[id]:!o[id]}))}>
        <div><span className="posture-name">{name}</span><span className="posture-slug">{slug}</span></div>
        <span style={{fontSize:11,color:'var(--t3)'}}>{open[id]?'▲':'▼'}</span>
      </div>
      {open[id]&&<div className="posture-body">{children}</div>}
    </div>
  );

  return(
    <div style={{marginTop:24}}>
      <div className="section-hdr" style={{marginBottom:12}}>
        <span className="sec-title">Security Posture Configuration</span>
        <span className="sec-meta">Assume Breach · Survive &amp; Repave</span>
      </div>

      {/* Auto-Repave */}
      <Block id="auto_repave" name="Auto-Repave" slug="/auto_repave">
        <CfgRow label="Enabled" sub="Automatically fire repave actions when thresholds are exceeded">
          <Toggle path={['auto_repave','enabled']} checked={!!sc.auto_repave?.enabled}/>
        </CfgRow>
        <div style={{height:1,background:'var(--b1)',margin:'4px 0'}}/>
        <div style={{fontSize:10,color:'var(--t3)',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:4}}>Triggers</div>
        <CfgRow label="Canary detections" sub="Canary blocks within the window that trigger auto-repave">
          <NumInput path={['auto_repave','triggers','canary_detections']} value={sc.auto_repave?.triggers?.canary_detections} min={1}/>
        </CfgRow>
        <CfgRow label="Risk sequence blocks" sub="High-risk sequence blocks within the window">
          <NumInput path={['auto_repave','triggers','risk_sequences']} value={sc.auto_repave?.triggers?.risk_sequences} min={1}/>
        </CfgRow>
        <CfgRow label="Window (minutes)" sub="Rolling time window for all counters">
          <NumInput path={['auto_repave','triggers','window_minutes']} value={sc.auto_repave?.triggers?.window_minutes} min={1} note="min"/>
        </CfgRow>
        <div style={{height:1,background:'var(--b1)',margin:'4px 0'}}/>
        <div style={{fontSize:10,color:'var(--t3)',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:4}}>Actions on trigger</div>
        <CfgRow label="Kill all sessions" sub="Close every active WebSocket connection">
          <Toggle path={['auto_repave','actions','kill_sessions']} checked={!!sc.auto_repave?.actions?.kill_sessions}/>
        </CfgRow>
        <CfgRow label="Rotate GoalLock canary" sub="Generate a new runtime canary, invalidating captured tokens">
          <Toggle path={['auto_repave','actions','rotate_canary']} checked={!!sc.auto_repave?.actions?.rotate_canary}/>
        </CfgRow>
      </Block>

      {/* Anomaly Scoring */}
      <Block id="anomaly" name="Anomaly Scoring" slug="/anomaly_scoring">
        <CfgRow label="Enabled" sub="Score 0–1 based on 3 behavioural signals per session">
          <Toggle path={['anomaly_scoring','enabled']} checked={!!sc.anomaly_scoring?.enabled}/>
        </CfgRow>
        <CfgRow label="Alert threshold" sub="Score ≥ this → red alert in Repave tab (0.34 = 1 of 3 signals)">
          <NumInput path={['anomaly_scoring','alert_threshold']} value={sc.anomaly_scoring?.alert_threshold} min={0} max={1} step={0.05}/>
        </CfgRow>
        <CfgRow label="Block threshold" sub="Score ≥ this → request blocked (0.9 = all 3 signals)">
          <NumInput path={['anomaly_scoring','block_threshold']} value={sc.anomaly_scoring?.block_threshold} min={0} max={1} step={0.05}/>
        </CfgRow>
        <div style={{padding:'8px 0 4px',fontSize:10,color:'var(--t3)',lineHeight:1.7}}>
          <b style={{color:'var(--t2)'}}>Signals scored:</b> (1) new tool appearing late in session · (2) velocity spike ≥5× same tool in last 10 calls · (3) dangerous succession <code>read_file→exec</code>
        </div>
      </Block>

      {/* Zero-Trust Tool Approval */}
      <Block id="zero_trust" name="Zero-Trust Tool Approval" slug="/zero_trust_tools">
        <CfgRow label="Enabled" sub="High-risk tools require explicit admin approval before first use per session">
          <Toggle path={['zero_trust_tools','enabled']} checked={!!sc.zero_trust_tools?.enabled}/>
        </CfgRow>
        <CfgRow label="Auto-deny after (minutes)" sub="Pending requests auto-denied if no admin action">
          <NumInput path={['zero_trust_tools','auto_deny_after_minutes']} value={sc.zero_trust_tools?.auto_deny_after_minutes} min={1} note="min"/>
        </CfgRow>
        <div>
          <div className="cfg-label" style={{marginBottom:4}}>High-risk tool list</div>
          <div className="cfg-sub" style={{marginBottom:8}}>Tool names that require approval before first use in a session</div>
          <div className="tag-list">
            {(sc.zero_trust_tools?.high_risk_tools||[]).map(t=>(
              <span key={t} className="tag">
                {t}
                {isAdmin&&<span className="tag-del" onClick={()=>removeTool(t)}>✕</span>}
              </span>
            ))}
          </div>
          {isAdmin&&(
            <div className="tag-add">
              <input className="tag-input" placeholder="tool name, e.g. exec" value={newTool}
                onChange={e=>setNewTool(e.target.value)}
                onKeyDown={e=>{if(e.key==='Enter'){addTool(newTool);setNewTool('');}}}/>
              <button className="tag-add-btn" onClick={()=>{addTool(newTool);setNewTool('');}}>Add</button>
            </div>
          )}
        </div>
      </Block>

      {/* Blast Radius */}
      <Block id="blast" name="Blast Radius Cap" slug="/blast_radius">
        <CfgRow label="Enabled" sub="Hard per-session limits — enforced regardless of all other policy">
          <Toggle path={['blast_radius','enabled']} checked={!!sc.blast_radius?.enabled}/>
        </CfgRow>
        <CfgRow label="Max tool calls / session" sub="Kill session after this many total tool invocations">
          <NumInput path={['blast_radius','max_tool_calls_per_session']} value={sc.blast_radius?.max_tool_calls_per_session} min={1}/>
        </CfgRow>
        <CfgRow label="Max blocks / session" sub="Kill session after this many blocks (repeated suspicious attempts)">
          <NumInput path={['blast_radius','max_blocks_per_session']} value={sc.blast_radius?.max_blocks_per_session} min={1}/>
        </CfgRow>
        <CfgRow label="Max high-risk calls / session" sub="Kill session after this many calls to zero-trust tools">
          <NumInput path={['blast_radius','max_high_risk_calls_per_session']} value={sc.blast_radius?.max_high_risk_calls_per_session} min={1}/>
        </CfgRow>
      </Block>

      {/* SIEM / Webhooks — multiple destinations */}
      <Block id="webhooks" name="SIEM / Webhooks" slug="/webhooks">
        <div style={{fontSize:11,color:'var(--t3)',marginBottom:12}}>
          Each destination fires independently on its configured events. Supports Slack, Splunk HEC, PagerDuty, and any generic JSON endpoint.
        </div>
        {(pol?.webhooks||[]).length===0&&<div style={{fontSize:11,color:'var(--t3)',marginBottom:10}}>No SIEM destinations configured yet.</div>}
        {(pol?.webhooks||[]).map((wh,idx)=>(
          <div key={idx} style={{border:'1px solid var(--b2)',borderRadius:'var(--r)',marginBottom:10,overflow:'hidden'}}>
            {/* Header row */}
            <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',background:'var(--s2)',borderBottom:'1px solid var(--b1)'}}>
              <div className={`sq-toggle ${wh.enabled?'on':''}`} onClick={()=>isAdmin&&setWebhookField(idx,'enabled',!wh.enabled)} style={{cursor:isAdmin?'pointer':'default'}}/>
              {isAdmin
                ?<input value={wh.name||''} onChange={e=>setWebhookField(idx,'name',e.target.value)}
                    style={{flex:1,background:'none',border:'none',outline:'none',color:'var(--t1)',fontSize:12,fontWeight:600,fontFamily:'var(--font)'}}
                    placeholder="SIEM name…"/>
                :<span style={{flex:1,fontSize:12,fontWeight:600,color:'var(--t1)'}}>{wh.name||'Unnamed'}</span>
              }
              {isAdmin&&<button onClick={()=>removeWebhook(idx)} style={{fontSize:11,color:'var(--t3)',cursor:'pointer',padding:'2px 6px',border:'1px solid var(--b2)',borderRadius:'var(--r)',background:'transparent'}} title="Remove">✕</button>}
            </div>
            {/* Fields */}
            <div style={{padding:'10px 12px',display:'flex',flexDirection:'column',gap:8}}>
              <CfgRow label="URL" sub="">
                {isAdmin
                  ?<input value={wh.url||''} onChange={e=>setWebhookField(idx,'url',e.target.value)}
                      style={{width:260,padding:'4px 8px',background:'var(--bg)',border:'1px solid var(--b2)',borderRadius:'var(--r)',color:'var(--t2)',fontSize:11,fontFamily:'monospace',outline:'none'}}
                      placeholder="https://…"/>
                  :<span className="ro-val">{wh.url||'not set'}</span>}
              </CfgRow>
              <CfgRow label="Format" sub="">
                {isAdmin
                  ?<select value={wh.format||'generic'} onChange={e=>setWebhookField(idx,'format',e.target.value)}
                      style={{padding:'4px 8px',background:'var(--bg)',border:'1px solid var(--b2)',borderRadius:'var(--r)',color:'var(--t2)',fontSize:11,outline:'none',cursor:'pointer'}}>
                      <option value="generic">Generic JSON</option>
                      <option value="slack">Slack Block Kit</option>
                      <option value="splunk">Splunk HEC</option>
                    </select>
                  :<span className="ro-val">{wh.format||'generic'}</span>}
              </CfgRow>
              <div>
                <div className="cfg-label" style={{marginBottom:6}}>Events</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                  {['BLOCKED','REDACTED','AUTO_REPAVE','BLAST_RADIUS','ANOMALY','CANARY_ROTATED','TOOL_APPROVED','TOOL_DENIED'].map(ev=>{
                    const on=(wh.events||[]).includes(ev);
                    return<span key={ev} onClick={()=>isAdmin&&toggleWebhookEvent(idx,ev)}
                      style={{padding:'2px 8px',borderRadius:10,fontSize:10,fontWeight:600,cursor:isAdmin?'pointer':'default',
                        background:on?'var(--purple-d)':'var(--b1)',color:on?'var(--purple)':'var(--t3)',
                        border:`1px solid ${on?'rgba(168,85,247,.35)':'var(--b2)'}`}}>
                      {ev}
                    </span>;
                  })}
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10,marginTop:4}}>
                <CfgRow label="Timeout (ms)" sub="">
                  {isAdmin
                    ?<input type="number" className="cfg-num" value={wh.timeout_ms||3000} min={200} max={10000} step={100}
                        onChange={e=>setWebhookField(idx,'timeout_ms',+e.target.value)}/>
                    :<span className="ro-val">{wh.timeout_ms||3000}</span>}
                </CfgRow>
                <CfgRow label="Include payload" sub="">
                  <div className={`sq-toggle ${wh.include_payload?'on':''}`}
                    onClick={()=>isAdmin&&setWebhookField(idx,'include_payload',!wh.include_payload)}
                    style={{cursor:isAdmin?'pointer':'default'}}/>
                </CfgRow>
                {isAdmin&&(
                  <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}}>
                    <button onClick={()=>testWebhook(idx)} disabled={testingIdx===idx||!wh.url}
                      style={{padding:'4px 12px',border:'1px solid var(--b2)',borderRadius:'var(--r)',fontSize:11,color:'var(--t2)',background:'var(--s2)',cursor:'pointer'}}>
                      {testingIdx===idx?'Sending…':'Test →'}
                    </button>
                    {testResults[idx]&&(
                      <span style={{fontSize:11,color:testResults[idx].error?'var(--red)':'var(--green)'}}>
                        {testResults[idx].error?'✗ '+testResults[idx].error:'✓ '+testResults[idx].tested+' sent'}
                      </span>
                    )}
                  </div>
                )}
              </div>
            </div>
          </div>
        ))}
        {isAdmin&&<button onClick={addWebhook} className="tag-add-btn" style={{width:'100%',padding:'7px',textAlign:'center'}}>+ Add SIEM destination</button>}
      </Block>

      {/* Threat Intelligence Feeds */}
      <Block id="feeds" name="Threat Intelligence Feeds" slug="/threat_feeds">
        <CfgRow label="Enabled" sub="Pull live malicious patterns from external URLs and apply them in-memory alongside policy.yaml">
          <Toggle path={['threat_feeds','enabled']} checked={!!pol?.threat_feeds?.enabled} top/>
        </CfgRow>
        <div style={{fontSize:11,color:'var(--t3)',lineHeight:1.7,padding:'4px 0 10px'}}>
          Feed URLs must return: <code>{'{"version":"1.0","rules":[{"rule":"regex","enabled":true}]}'}</code>
        </div>
        {(pol?.threat_feeds?.feeds||[]).length===0&&<div style={{fontSize:11,color:'var(--t3)',marginBottom:10}}>No feeds configured yet.</div>}
        {(pol?.threat_feeds?.feeds||[]).map((feed,idx)=>(
          <div key={idx} style={{border:'1px solid var(--b2)',borderRadius:'var(--r)',marginBottom:8,overflow:'hidden'}}>
            <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',background:'var(--s2)',borderBottom:'1px solid var(--b1)'}}>
              <div className={`sq-toggle ${feed.enabled?'on':''}`} onClick={()=>isAdmin&&setFeedField(idx,'enabled',!feed.enabled)} style={{cursor:isAdmin?'pointer':'default'}}/>
              {isAdmin
                ?<input value={feed.name||''} onChange={e=>setFeedField(idx,'name',e.target.value)}
                    style={{flex:1,background:'none',border:'none',outline:'none',color:'var(--t1)',fontSize:12,fontWeight:600,fontFamily:'var(--font)'}}
                    placeholder="Feed name…"/>
                :<span style={{flex:1,fontSize:12,fontWeight:600,color:'var(--t1)'}}>{feed.name||'Unnamed'}</span>
              }
              {isAdmin&&<button onClick={()=>removeFeed(idx)} style={{fontSize:11,color:'var(--t3)',cursor:'pointer',padding:'2px 6px',border:'1px solid var(--b2)',borderRadius:'var(--r)',background:'transparent'}}>✕</button>}
            </div>
            <div style={{padding:'10px 12px',display:'flex',flexDirection:'column',gap:8}}>
              <CfgRow label="URL" sub="Must serve the AgentArmor feed JSON format">
                {isAdmin
                  ?<input value={feed.url||''} onChange={e=>setFeedField(idx,'url',e.target.value)}
                      style={{width:260,padding:'4px 8px',background:'var(--bg)',border:'1px solid var(--b2)',borderRadius:'var(--r)',color:'var(--t2)',fontSize:11,fontFamily:'monospace',outline:'none'}}
                      placeholder="https://gist.githubusercontent.com/…"/>
                  :<span className="ro-val" style={{fontFamily:'monospace',fontSize:11}}>{feed.url||'not set'}</span>}
              </CfgRow>
              <CfgRow label="Scanner" sub="Which scanner applies these rules">
                {isAdmin
                  ?<select value={feed.scanner||'prompt_injection'} onChange={e=>setFeedField(idx,'scanner',e.target.value)}
                      style={{padding:'4px 8px',background:'var(--bg)',border:'1px solid var(--b2)',borderRadius:'var(--r)',color:'var(--t2)',fontSize:11,outline:'none',cursor:'pointer'}}>
                      <option value="prompt_injection">Prompt Injection</option>
                      <option value="malicious_content">Malicious Content</option>
                      <option value="pii">PII / DLP</option>
                      <option value="secrets">Secrets</option>
                    </select>
                  :<span className="ro-val">{feed.scanner}</span>}
              </CfgRow>
              <CfgRow label="Poll interval (min)" sub="How often to refresh from the URL">
                {isAdmin
                  ?<input type="number" className="cfg-num" value={feed.interval_minutes||60} min={1} onChange={e=>setFeedField(idx,'interval_minutes',+e.target.value)}/>
                  :<span className="ro-val">{feed.interval_minutes} min</span>}
              </CfgRow>
              <FeedStatus url={feed.url}/>
            </div>
          </div>
        ))}
        {isAdmin&&<button onClick={addFeed} className="tag-add-btn" style={{width:'100%',padding:'7px',textAlign:'center'}}>+ Add intelligence feed</button>}
      </Block>
    </div>
  );
}

function FeedStatus({url}){
  const[status,setStatus]=useState(null);
  useEffect(()=>{
    if(!url)return;
    const load=()=>api('feeds').then(r=>r.json()).then(d=>{const s=(d||[]).find(f=>f.url===url);setStatus(s||null);}).catch(()=>{});
    load();const t=setInterval(load,15000);return()=>clearInterval(t);
  },[url]);
  if(!status)return null;
  return(
    <div style={{display:'flex',gap:16,fontSize:10,color:'var(--t3)',marginTop:2}}>
      <span style={{color:status.last_error?'var(--red)':'var(--green)'}}>{status.last_error?'✗ '+status.last_error:'✓ '+status.rule_count+' rules active'}</span>
      {status.last_fetched&&<span>last: {status.last_fetched.slice(11,19)}</span>}
    </div>
  );
}

function Policy({role}){
  const[pol,setPol]=useState(null);
  const[dirty,setDirty]=useState(false);
  const[saving,setSaving]=useState(false);
  const[testInput,setTestInput]=useState('');
  const[selectedRule,setSelectedRule]=useState(null);
  const[openGroups,setOpenGroups]=useState({});
  const isAdmin=role==='admin';
  useEffect(()=>{api('policy').then(r=>r.json()).then(d=>{setPol(d);setDirty(false);});},[]);
  const toggleRule=(key,lk,idx)=>{
    if(!isAdmin)return;
    setPol(p=>{const n=JSON.parse(JSON.stringify(p));n.scanners[key][lk][idx].enabled=!n.scanners[key][lk][idx].enabled;return n;});
    setDirty(true);
  };
  const toggleScanner=key=>{
    if(!isAdmin)return;
    setPol(p=>{const n=JSON.parse(JSON.stringify(p));n.scanners[key].enabled=!n.scanners[key].enabled;return n;});
    setDirty(true);
  };
  // Setter for scanners.* nested fields
  const setField=(path,value)=>{
    if(!isAdmin)return;
    setPol(p=>{
      const n=JSON.parse(JSON.stringify(p));
      let obj=n.scanners;
      for(let i=0;i<path.length-1;i++) obj=obj[path[i]];
      obj[path[path.length-1]]=value;
      return n;
    });
    setDirty(true);
  };
  // Setter for top-level fields (webhook, threat_feeds)
  const setTopField=(path,value)=>{
    if(!isAdmin)return;
    setPol(p=>{
      const n=JSON.parse(JSON.stringify(p));
      let obj=n;
      for(let i=0;i<path.length-1;i++){if(!obj[path[i]])obj[path[i]]={};obj=obj[path[i]];}
      obj[path[path.length-1]]=value;
      return n;
    });
    setDirty(true);
  };
  // Tool list helpers
  const addTool=(tool)=>{
    if(!isAdmin||!tool.trim())return;
    setPol(p=>{
      const n=JSON.parse(JSON.stringify(p));
      const tools=n.scanners.zero_trust_tools?.high_risk_tools||[];
      if(!tools.includes(tool.trim()))tools.push(tool.trim());
      n.scanners.zero_trust_tools.high_risk_tools=tools;
      return n;
    });
    setDirty(true);
  };
  const removeTool=(tool)=>{
    if(!isAdmin)return;
    setPol(p=>{
      const n=JSON.parse(JSON.stringify(p));
      n.scanners.zero_trust_tools.high_risk_tools=(n.scanners.zero_trust_tools?.high_risk_tools||[]).filter(t=>t!==tool);
      return n;
    });
    setDirty(true);
  };
  const save=async()=>{setSaving(true);await api('policy',{method:'POST',body:JSON.stringify(pol)});setSaving(false);setDirty(false);};
  const testMatches=useMemo(()=>{
    if(!pol||!testInput.trim())return[];
    const matches=[];
    const sc=pol.scanners;
    const tl=testInput.toLowerCase();
    (sc.prompt_injection?.blocked_phrases||[]).forEach(r=>{if(r.enabled&&tl.includes(r.rule))matches.push('prompt injection · '+r.rule);});
    (sc.canary_tokens?.tokens||[]).forEach(r=>{if(r.enabled&&testInput.includes(r.rule))matches.push('canary · '+r.rule);});
    (sc.pii?.block_patterns||[]).forEach(r=>{try{if(r.enabled&&new RegExp(r.rule).test(testInput))matches.push('pii · '+r.rule);}catch{}});
    (sc.malicious_content?.block_patterns||[]).forEach(r=>{try{if(r.enabled&&new RegExp(r.rule,'i').test(testInput))matches.push('malicious · '+r.rule);}catch{}});
    return matches;
  },[pol,testInput]);
  if(!pol)return<div className="empty loading">Loading policy…</div>;
  const totalRules=[pol.scanners.prompt_injection?.blocked_phrases,pol.scanners.secrets?.redact_patterns,pol.scanners.pii?.block_patterns,pol.scanners.malicious_content?.block_patterns].flat().filter(Boolean).length;
  const activeRules=[pol.scanners.prompt_injection?.blocked_phrases,pol.scanners.secrets?.redact_patterns,pol.scanners.pii?.block_patterns,pol.scanners.malicious_content?.block_patterns].flat().filter(r=>r?.enabled).length;
  const groups=[
    {key:'prompt_injection',name:'Prompt Injection',slug:'/prompt_injection',lk:'blocked_phrases',action:'block'},
    {key:'secrets',         name:'Secret Redaction',slug:'/secrets',         lk:'redact_patterns',action:'redact'},
    {key:'pii',             name:'PII / DLP',        slug:'/pii',             lk:'block_patterns', action:'block'},
    {key:'malicious_content',name:'Malicious Content',slug:'/malicious_content',lk:'block_patterns',action:'block'},
    {key:'canary_tokens',   name:'Canary Tokens',    slug:'/canary_tokens',   lk:'tokens',         action:'block'},
  ];
  const toggleGroupOpen=key=>setOpenGroups(o=>({...o,[key]:!o[key]}));

  return(
    <div>
      <div className="two-col">
        <div className="col-main">
          <div className="page-label"><span className="page-label-dot"/><span>Policy</span><span>·</span><span>{activeRules} Active Rules</span></div>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:24}}>
            <h1 className="page-headline">Tune what the proxy <span className="red">blocks</span>,<br/>
              <span className="yel">redacts</span>, or lets pass.</h1>
            {isAdmin&&(
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8}}>
                <div className="page-meta">
                  <div className="page-meta-row"><span className="page-meta-label">RULES</span><span className="page-meta-val">{activeRules}/{totalRules} active</span></div>
                </div>
                {dirty&&<button className="btn-save" onClick={save} disabled={saving}>{saving?'Saving…':'Save changes'}</button>}
              </div>
            )}
          </div>
          {/* Test panel */}
          <div className="test-panel" style={{marginBottom:20}}>
            <div className="test-label"><span>▶ Test Rules Against Input</span><span className="test-live">live · matches as you type</span></div>
            <textarea className="test-textarea" placeholder="Type a message to test against all active rules…" value={testInput} onChange={e=>setTestInput(e.target.value)}/>
            <div className="test-matches">
              {testMatches.map((m,i)=><span key={i} className="test-match">{m}</span>)}
              {testInput&&!testMatches.length&&<span style={{fontSize:10,color:'var(--t3)'}}>No rules match — message would pass</span>}
            </div>
          </div>
          {/* Scanner groups — collapsible */}
          {groups.map((g,idx)=>{
            const sc=pol.scanners[g.key]; if(!sc)return null;
            const rl=sc[g.lk]||[];
            const enabled=rl.filter(r=>r.enabled).length;
            // First group open by default (key not yet in map → open if index 0)
            const isOpen=g.key in openGroups ? openGroups[g.key] : idx===0;
            return(
              <div key={g.key} className="posture-block">
                <div className="posture-hdr" onClick={()=>toggleGroupOpen(g.key)}>
                  <div style={{display:'flex',alignItems:'baseline',gap:8}}>
                    <span className="posture-name">{g.name}</span>
                    <span className="posture-slug">{g.slug}</span>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:12}}>
                    <span style={{fontSize:11,color:'var(--t3)'}}>{enabled}/{rl.length} rules</span>
                    {/* Stop propagation so toggle click doesn't collapse the group */}
                    <div className={`sq-toggle ${sc.enabled?'on':''}`}
                      onClick={ev=>{ev.stopPropagation();toggleScanner(g.key);}}
                      title={sc.enabled?'Scanner enabled — click to disable':'Scanner disabled — click to enable'}/>
                    <span style={{fontSize:11,color:'var(--t3)',width:10,textAlign:'center'}}>{isOpen?'▲':'▼'}</span>
                  </div>
                </div>
                {isOpen&&(
                  <table className="rule-table">
                    <thead><tr>
                      <th width="20"></th>
                      <th>Pattern</th>
                      <th width="70">Hits 24h</th>
                      <th width="90">12h Trend</th>
                      <th width="80">Last Hit</th>
                      <th width="20"></th>
                    </tr></thead>
                    <tbody>{rl.map((rule,i)=>(
                      <tr key={i} onClick={()=>setSelectedRule({...rule,scanner:g.name,path:g.slug})} style={{cursor:'pointer'}}>
                        <td><div className={`sq-toggle ${rule.enabled?'on':''}`} onClick={ev=>{ev.stopPropagation();toggleRule(g.key,g.lk,i);}}/></td>
                        <td><span className="rule-pattern" style={{color:rule.enabled?'var(--t2)':'var(--t3)'}}>{rule.rule}</span></td>
                        <td><span className="rule-hits">—</span></td>
                        <td><Sparkline data={[]} color="#ef4444" w={80} h={20}/></td>
                        <td><span className="rule-last">never</span></td>
                        <td><span className="rule-arrow">→</span></td>
                      </tr>
                    ))}</tbody>
                  </table>
                )}
              </div>
            );
          })}

          {/* ── Security Posture Config ── */}

              <>
                <div className="inspector-rule">{selectedRule.rule}</div>
                <div className="inspector-stats">
                  <div className="inspector-stat"><div className="inspector-stat-label">Hits · 24h</div><div className="inspector-stat-val">—</div></div>
                  <div className="inspector-stat"><div className="inspector-stat-label">Last Triggered</div><div className="inspector-stat-val" style={{fontSize:14}}>—</div></div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
                  <div className="inspector-stat"><div className="inspector-stat-label">Status</div><div style={{fontSize:13,color:selectedRule.enabled?'var(--green)':'var(--t3)',fontWeight:600}}>{selectedRule.enabled?'active':'disabled'}</div></div>
                  <div className="inspector-stat"><div className="inspector-stat-label">Action</div><div style={{fontSize:13,color:'var(--red)',fontWeight:600}}>block</div></div>
                </div>
                <div className="recent-matches-title">Recent Matches</div>

            )}

        </div>
      </div>
    </div>
  );
}

/* ═══ AUDIT ═══ */
function Audit({events,onRefresh,autoRefresh,setAutoRefresh,refreshMs,setRefreshMs}){
  const[q,setQ]=useState('');
  const[f,setF]=useState('ALL');
  const[dir,setDir]=useState('ALL');
  const[paused,setPaused]=useState(false);
  const rows=useMemo(()=>{
    let d=events||[];
    if(f!=='ALL')d=d.filter(e=>e.action===f);
    if(dir==='INGRESS')d=d.filter(e=>(e.direction||'').includes('Request'));
    if(dir==='EGRESS')d=d.filter(e=>(e.direction||'').includes('Response'));
    if(q){const ql=q.toLowerCase();d=d.filter(e=>['rule_matched','direction','payload_snippet'].some(k=>(e[k]||'').toLowerCase().includes(ql)));}
    return d;
  },[events,q,f,dir]);
  const total=events.length,allowed=events.filter(e=>e.action==='ALLOWED').length,redacted=events.filter(e=>e.action==='REDACTED').length,blocked=events.filter(e=>e.action==='BLOCKED').length;
  return(
    <div>
      <div style={{padding:'24px 24px 0'}}>
        <div className="page-label"><span className="page-label-dot"/><span>Audit</span><span>·</span><span>Live Stream</span></div>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:20}}>
          <h1 className="page-headline">Every request and response, <span className="accent">scored</span><br/>at the wire.</h1>
          <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8}}>
            <div className="page-meta">
              <div className="page-meta-row"><span className="page-meta-label">Showing</span><span className="page-meta-val">{rows.length}/{total}</span></div>
              <div className="page-meta-row"><span className="page-meta-label">Retention</span><span className="page-meta-val">last 200</span></div>
            </div>
            <div style={{display:'flex',gap:6}}>
              <button className="pause-btn" onClick={onRefresh}>↻ Refresh</button>
              <button className={`pause-btn ${autoRefresh?'on':''}`} onClick={()=>setAutoRefresh(o=>!o)}>{autoRefresh?'⟳ AUTO ON':'AUTO'}</button>
              {autoRefresh&&<select value={refreshMs} onChange={e=>setRefreshMs(+e.target.value)} style={{padding:'3px 6px',border:'1px solid var(--yellow)',borderRadius:'var(--r)',background:'var(--bg)',color:'var(--yellow)',fontSize:10}}>
                {[[5000,'5s'],[15000,'15s'],[30000,'30s'],[60000,'1m']].map(([v,l])=><option key={v} value={v}>{l}</option>)}
              </select>}
            </div>
          </div>
        </div>
        <div className="stat-row" style={{gridTemplateColumns:'repeat(4,1fr)',marginBottom:16}}>
          {[['Total · Last 200',total,'',''],[`Allowed`,allowed,'g','71% pass-through'],[`Redacted`,redacted,'y','secrets stripped'],[`Blocked`,blocked,'r','dropped before model']].map(([l,v,c,s])=>(
            <div key={l} className="stat-card" style={{padding:'12px 14px'}}>
              <div className="stat-label">{l}</div>
              <div className={`stat-val ${c}`} style={{fontSize:26}}>{fmt(v)}</div>
              {s&&<div className="stat-sub">{s}</div>}
            </div>
          ))}
        </div>
      </div>
      <div className="audit-search-row">
        <span className="audit-search-icon">◎</span>
        <input className="audit-search-input" placeholder="Search rule, payload, IP, service…" value={q} onChange={e=>setQ(e.target.value)}/>
        <div className="filter-grp">
          {['ALL','BLOCKED','REDACTED','ALLOWED'].map(ff=><button key={ff} className={`filter-btn ${f===ff?'on':''}`} onClick={()=>setF(ff)}>{ff}</button>)}
        </div>
        <div className="filter-grp" style={{marginLeft:6}}>
          {['ALL','INGRESS','EGRESS'].map(dd=><button key={dd} className={`filter-btn ${dir===dd?'on':''}`} onClick={()=>setDir(dd)}>{dd}</button>)}
        </div>
        <button className={`pause-btn ${paused?'on':''}`} style={{marginLeft:6}} onClick={()=>setPaused(o=>!o)}>· {paused?'paused':'live'}</button>
      </div>
      <div className="audit-table-wrap">
        <table className="audit-table">
          <thead><tr>
            <th>Time</th><th>Direction</th><th>Action</th><th>Rule</th><th>Payload</th><th>Client</th>
          </tr></thead>
          <tbody>
            {!rows.length&&<tr><td colSpan="6" className="empty">No events match.</td></tr>}
            {rows.map(e=>(
              <tr key={e.id}>
                <td className="col-time">{(e.timestamp||'').replace('T',' ').slice(0,19)}</td>
                <td className="col-dir"><span style={{fontSize:10,color:'var(--t3)'}}>{(e.direction||'').includes('Request')?'↓ IN':'↑ OUT'}</span></td>
                <td className="col-action"><span className={`badge badge-${(e.action||'').toLowerCase()}`}>{e.action}</span></td>
                <td className="col-rule">{e.rule_matched||'—'}</td>
                <td className="col-payload">{e.payload_snippet||'—'}</td>
                <td className="col-client">{e.client_ip||e.session_key||'—'}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ═══ FIREWALL ═══ */
function Firewall({fw,audit}){
  const domains=fw?.allowed_domains||[];
  const recentDenies=useMemo(()=>(audit||[]).filter(e=>(e.rule_matched||'').toLowerCase().includes('dns rebinding')||(e.rule_matched||'').toLowerCase().includes('internal ip')).slice(0,8),[audit]);
  return(
    <div className="two-col">
      <div className="col-main">
        <div className="page-label"><span className="page-label-dot"/><span>Firewall</span><span>·</span><span>Layer 3/4 Egress</span></div>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:24}}>
          <h1 className="page-headline">Outbound traffic from the agent<br/>container, <span className="accent">strictly allow-listed</span>.</h1>

            <div className="page-meta-row"><span className="page-meta-label">Allowed</span><span className="page-meta-val">{domains.length} hosts</span></div>

          <div className="fw-row-hdr">
            <span></span><span>Host</span><span>Connections</span><span>Last Seen</span><span>Trend</span><span>Protocol</span>
          </div>
          {!domains.length&&<div className="empty">No domains whitelisted.</div>}
          {domains.map((d,i)=>(
            <div key={i} className="fw-domain-row">
              <span className="fw-led"/>
              <div>
                <div className="fw-host">{d}</div>
                <div className="fw-tag">LLM Provider</div>
              </div>
              <div>
                <div className="fw-stat-label">Connections</div>
                <div className="fw-stat-val">—</div>
                <div className="fw-stat-sub">last 24h</div>
              </div>
              <div>
                <div className="fw-stat-label">Last Seen</div>
                <div className="fw-stat-val" style={{fontSize:11}}>—</div>
              </div>
              <Sparkline data={[]} color="#22c55e" w={80} h={24}/>
              <div style={{fontSize:11,color:'var(--t3)'}}>via TLS 1.3</div>
            </div>
          ))}
        </div>
      </div>
      <div className="col-side">
        <div className="recent-title">Recent Denies · Last 24h</div>
        {!recentDenies.length?(
          <div style={{fontSize:11,color:'var(--t3)',lineHeight:1.7}}>No denied requests recorded. All outbound traffic is matching the allow-list.</div>
        ):recentDenies.map(e=>(
          <div key={e.id} className="deny-item">
            <div className="deny-header"><span className="deny-time">{(e.timestamp||'').slice(11,19)}</span><span className="deny-reason">Not in allowlist</span></div>
            <div className="deny-domain">{(e.rule_matched||'').replace('DNS Rebinding Detected: ','').replace('Internal IP Detected: ','')}</div>
            <div className="deny-from">{e.direction}</div>
          </div>
        ))}
        <div className="policy-note">
          <div className="policy-note-title">Request Policy Change</div>
          <div className="policy-note-body">Egress allow-list is managed via <code>firewall.yaml</code>. Add a domain and restart the container to allow outbound traffic to a new host.</div>
        </div>
      </div>
    </div>
  );
}
