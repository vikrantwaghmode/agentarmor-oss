services:
  agentarmor:
    build: .
    container_name: agentarmor
    cap_add:
      - NET_ADMIN           # Required for iptables firewall
    ports:
      - "8443:8443"          # AgentArmor Proxy — HTTPS (primary)
      - "8080:8080"          # HTTP redirect → https://host:8443
    environment:
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - USER_TOKEN=${USER_TOKEN}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - ./data:/app/data                # Audit logs (SQLite)
      - ./config:/data/.openclaw        # OpenClaw state & config
      - ./workspace:/data/workspace     # OpenClaw workspace
      # Mount our custom security skill into OpenClaw's plugin directory.
      - ./openclaw-plugins:/app/openclaw/dist/custom-plugins
      - ./policy.yaml:/app/policy.yaml  # Live-reloadable policy
      - ./firewall.yaml:/app/firewall.yaml
      - ./certs:/app/certs              # TLS certs — auto-generated if empty, replace for production
      - ./tenants:/app/tenants          # Per-tenant configs — created from dashboard or by hand
      - ./skills:/app/skills            # Live-editable skill definitions + RAG docs
    restart: unless-stopped
    env_file:
      - .env

  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:latest
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 12          # up to 2 min for NLP model load
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  ollama_data:
