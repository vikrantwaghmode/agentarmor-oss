services:
  agentarmor:
    build: .
    container_name: agentarmor
    cap_add:
      - NET_ADMIN           # Required for iptables firewall
    ports:
      - "8080:8080"          # AgentArmor Proxy (the only entry point)
    environment:
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - USER_TOKEN=${USER_TOKEN}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - ./data:/app/data                # Audit logs (SQLite)
      - ./config:/data/.openclaw        # OpenClaw state & config
      - ./workspace:/data/workspace     # OpenClaw workspace
      - ./policy.yaml:/app/policy.yaml  # Live-reloadable policy
      - ./firewall.yaml:/app/firewall.yaml
    restart: unless-stopped
    env_file:
      - .env

  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:latest
    ports:
      - "5000:5000"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
