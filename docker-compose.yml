services:
  agentarmor:
    build: .
    container_name: agentarmor
    cap_add:
      - NET_ADMIN           # Required for iptables firewall
    ports:
      - "8443:8443"          # AgentArmor Proxy — HTTPS (primary)
      - "8080:8080"          # HTTP redirect → https://host:8443
      - "80:80"              # ACME HTTP-01 challenge (only needed when ACME_DOMAIN is set)
    environment:
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - USER_TOKEN=${USER_TOKEN}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - ./data:/app/data                # Audit logs (SQLite default)
      - ./config:/data/.openclaw        # OpenClaw state & config
      - ./workspace:/data/workspace     # OpenClaw workspace
      # Mount our custom security skill into OpenClaw's plugin directory.
      - ./openclaw-plugins:/app/openclaw/dist/custom-plugins
      - ./policy.yaml:/app/policy.yaml  # Live-reloadable policy
      - ./infra.yaml:/app/infra.yaml    # Infrastructure config (DB, Redis, ACME, metrics)
      - ./firewall.yaml:/app/firewall.yaml
      - ./certs:/app/certs              # TLS certs — auto-generated if empty, replace for production
      - ./tenants:/app/tenants          # Per-tenant configs — created from dashboard or by hand
      - ./skills:/app/skills            # Live-editable skill definitions + RAG docs
      - ./wasm-filters:/app/wasm-filters # Custom WASM filters — hot-reloaded from dashboard
    restart: unless-stopped
    env_file:
      - .env
    # For PostgreSQL HA mode, add a depends_on and pass DATABASE_URL in .env:
    # depends_on:
    #   postgres:
    #     condition: service_healthy
    #   redis:
    #     condition: service_healthy

  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:latest
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 12          # up to 2 min for NLP model load
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # ── Optional: PostgreSQL for HA audit log ────────────────────────────────────
  # Uncomment and set DATABASE_URL=postgres://agentarmor:secret@postgres:5432/agentarmor in .env
  #
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_DB: agentarmor
  #     POSTGRES_USER: agentarmor
  #     POSTGRES_PASSWORD: secret
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U agentarmor"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 10

  # ── Optional: Redis for distributed rate limiting ─────────────────────────────
  # Uncomment and set REDIS_URL=redis://redis:6379 in .env
  #
  # redis:
  #   image: redis:7-alpine
  #   command: redis-server --save "" --appendonly no
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 10

  # ── Optional: Jaeger for OpenTelemetry traces ─────────────────────────────────
  # Uncomment and set OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318 in .env
  #
  # jaeger:
  #   image: jaegertracing/all-in-one:latest
  #   ports:
  #     - "16686:16686"   # Jaeger UI
  #     - "4318:4318"     # OTLP/HTTP receiver
  #   environment:
  #     - COLLECTOR_OTLP_ENABLED=true

volumes:
  ollama_data:
  # postgres_data:
