{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentarmor.fullname" . }}-auth
  labels:
    {{- include "agentarmor.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.adminTokenKey }}: {{ .Values.auth.adminToken | required "auth.adminToken is required" | quote }}
  {{ .Values.auth.userTokenKey }}: {{ .Values.auth.userToken | required "auth.userToken is required" | quote }}
{{- end }}
{{- if and .Values.oidc.enabled (not .Values.oidc.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentarmor.fullname" . }}-oidc
  labels:
    {{- include "agentarmor.labels" . | nindent 4 }}
type: Opaque
stringData:
  oidc-client-secret: {{ .Values.oidc.clientSecret | quote }}
{{- end }}
